<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGas Pro | Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ===================== VARIABLES ===================== */
        :root {
            --primary: #6366f1;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* ===================== RESET ===================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ===================== HEADER ===================== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 34px; height: 34px;
            background: var(--primary);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 16px;
        }
        .app-title { font-size: 17px; font-weight: 700; }
        .header-right { display: flex; align-items: center; gap: 14px; }

        /* Batería */
        .battery-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
        .battery-outer {
            width: 38px; height: 16px;
            border: 2px solid var(--text-muted);
            border-radius: 4px;
            position: relative; overflow: hidden;
        }
        .battery-outer::after {
            content: '';
            position: absolute; right: -5px; top: 50%;
            transform: translateY(-50%);
            width: 3px; height: 7px;
            background: var(--text-muted);
            border-radius: 0 2px 2px 0;
        }
        #bat-level { height: 100%; background: var(--accent); transition: width 0.5s; border-radius: 2px; }
        #plan-badge {
            font-size: 11px; font-weight: 700;
            background: var(--primary); color: white;
            padding: 3px 10px; border-radius: 20px;
        }
        .btn-theme {
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 18px;
            width: 34px; height: 34px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-theme:hover { background: var(--border); }

        /* ===================== MAIN GRID ===================== */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            main { grid-template-columns: 1fr 1fr; }
            .card-chart { grid-column: 1 / -1; }
        }

        /* ===================== CARD ===================== */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 12px; font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 20px;
        }

        /* ===================== GAUGE ===================== */
        .gauge-wrap {
            display: flex; flex-direction: column;
            align-items: center; gap: 12px;
        }
        .gauge-svg-container { position: relative; display: inline-block; }
        .gauge-bg { fill: none; stroke: var(--border); stroke-width: 16; stroke-linecap: round; }
        #gauge-fill {
            fill: none; stroke: var(--primary);
            stroke-width: 16; stroke-linecap: round;
            stroke-dasharray: 0 282.74;
            transition: stroke-dasharray 0.8s ease, stroke 0.4s;
        }
        .gauge-center-text {
            position: absolute; bottom: 10px; left: 50%;
            transform: translateX(-50%);
            text-align: center; white-space: nowrap;
        }
        #gauge-pct  { font-size: 36px; font-weight: 700; color: var(--primary); line-height: 1; }
        #gauge-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        /* ── VISOR DIGITAL: 1 decimal, más grande, azul ── */
        .weight-display {
            display: flex; align-items: baseline;
            justify-content: center; gap: 4px;
        }
        #digital {
            font-size: 48px;        /* más grande */
            font-weight: 700;
            color: var(--primary);  /* azul */
            line-height: 1;
            letter-spacing: -1px;
        }
        .weight-unit {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .last-update { font-size: 11px; color: var(--text-muted); text-align: center; }

        /* ===================== CONFIG ===================== */

        /* Inputs en fila (2 columnas) para ahorrar espacio */
        .inputs-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .input-group label {
            font-size: 11px; color: var(--text-muted);
            display: block; margin-bottom: 4px; font-weight: 600;
        }
        .input-group input {
            width: 100%; padding: 9px 10px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--bg);
            color: var(--text-main);
            font-size: 13px; font-family: inherit;
            transition: border-color 0.2s;
        }
        .input-group input:focus { outline: none; border-color: var(--primary); }
        .btn-save {
            width: 100%; padding: 10px;
            background: var(--primary); color: white;
            border: none; border-radius: 9px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; margin-bottom: 14px;
            transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.88; }

        /* ── Info boxes: última lectura + días estimados ── */
        .info-boxes { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
        .info-box {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .info-box-icon {
            font-size: 20px; flex-shrink: 0;
            width: 32px; height: 32px;
            background: rgba(99,102,241,0.1);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .info-box-body { flex: 1; min-width: 0; }
        .info-box-label {
            font-size: 10px; font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .info-box-value {
            font-size: 14px; font-weight: 600;
            color: var(--text-main);
            margin-top: 2px;
        }
        .info-box-note {
            font-size: 10px; color: var(--text-muted);
            margin-top: 3px; line-height: 1.4;
            font-style: italic;
        }
        .info-box-value.highlight { color: var(--primary); }
        .info-box-value.warning   { color: var(--warning); }
        .info-box-value.danger    { color: var(--danger);  }

        /* Plan tabs */
        .plan-tabs { display: flex; gap: 8px; }
        .plan-tab {
            flex: 1; padding: 8px 4px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: none; cursor: pointer;
            font-size: 11px; font-weight: 600;
            color: var(--text-muted); text-align: center;
            transition: all 0.2s;
        }
        .plan-tab span { display: block; font-size: 10px; font-weight: 400; margin-top: 2px; }
        .plan-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* ===================== CHART ===================== */
        .chart-container { height: 220px; }

        /* ===================== MOBILE ===================== */
        @media (max-width: 767px) {
            main { padding: 16px 12px; gap: 14px; }
            .card { padding: 18px; }
            #gauge-pct { font-size: 28px; }
            #digital   { font-size: 38px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-left">
        <div class="logo-icon"><i class="fas fa-fire"></i></div>
        <span class="app-title">SmartGas PRO</span>
    </div>
    <div class="header-right">
        <div class="battery-wrap">
            <div class="battery-outer"><div id="bat-level" style="width:50%"></div></div>
            <span id="bat-text">--%</span>
        </div>
        <span id="plan-badge">CARGANDO</span>
        <button class="btn-theme" onclick="toggleTheme()" title="Cambiar tema">
            <i class="fas fa-moon"></i>
        </button>
    </div>
</header>

<!-- MAIN -->
<main>

    <!-- CARD GAUGE -->
    <div class="card">
        <div class="card-title"><i class="fas fa-tachometer-alt"></i> Nivel Actual</div>
        <div class="gauge-wrap">
            <div class="gauge-svg-container">
                <svg width="200" height="110" viewBox="0 0 200 110">
                    <path class="gauge-bg"  d="M 10 100 A 90 90 0 0 1 190 100"/>
                    <path id="gauge-fill"   d="M 10 100 A 90 90 0 0 1 190 100"/>
                </svg>
                <div class="gauge-center-text">
                    <div id="gauge-pct">--%</div>
                    <div id="gauge-label">Nivel de gas</div>
                </div>
            </div>

            <!-- VISOR DIGITAL: 1 decimal, azul, grande -->
            <div class="weight-display">
                <span id="digital">0.0</span>
                <span class="weight-unit">kg</span>
            </div>
            <div class="last-update" id="last-update-gauge">Actualizando...</div>
        </div>
    </div>

    <!-- CARD CONFIG -->
    <div class="card">
        <div class="card-title"><i class="fas fa-cog"></i> Configuración</div>

        <!-- Inputs en 2 columnas -->
        <div class="inputs-row">
            <div class="input-group">
                <label>Peso Vacío (kg)</label>
                <input type="number" id="empty-weight" step="0.1" placeholder="Ej: 8.5">
            </div>
            <div class="input-group">
                <label>Peso Lleno (kg)</label>
                <input type="number" id="full-weight" step="0.1" placeholder="Ej: 23.5">
            </div>
        </div>
        <button class="btn-save" onclick="saveConfig()">
            <i class="fas fa-save"></i>&nbsp; Guardar
        </button>

        <!-- Info boxes -->
        <div class="info-boxes">

            <!-- Última lectura -->
            <div class="info-box">
                <div class="info-box-icon">📅</div>
                <div class="info-box-body">
                    <div class="info-box-label">Última lectura</div>
                    <div class="info-box-value" id="last-reading">—</div>
                </div>
            </div>

            <!-- Días estimados -->
            <div class="info-box">
                <div class="info-box-icon">⏳</div>
                <div class="info-box-body">
                    <div class="info-box-label">Días estimados de gas</div>
                    <div class="info-box-value highlight" id="days-remaining">Calculando...</div>
                    <div class="info-box-note">
                        Valor aproximado según consumo promedio de las últimas 24 horas.
                    </div>
                </div>
            </div>

        </div>

        <!-- Plan tabs -->
        <div class="plan-tabs">
            <button class="plan-tab active">FREE<span>24 horas</span></button>
            <button class="plan-tab">HOGAR<span>30 días</span></button>
            <button class="plan-tab">PRO<span>6 meses</span></button>
        </div>
    </div>

    <!-- CARD CHART (ancho completo en PC) -->
    <div class="card card-chart">
        <div class="card-title"><i class="fas fa-chart-line"></i> Historial de Consumo</div>
        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
    </div>

</main>

<script>
// ===================== SUPABASE =====================
const SUPABASE_URL      = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===================== DEVICE & TIMEZONE =====================
const params = new URLSearchParams(window.location.search);
const device = params.get('device') || localStorage.getItem('device_mac') || '';
if (device) localStorage.setItem('device_mac', device);

const TZ = 'America/Santiago';

function fmtDate(iso) {
    return new Date(iso).toLocaleString('es-CL', {
        timeZone: TZ,
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });
}
function fmtShort(iso) {
    return new Date(iso).toLocaleString('es-CL', {
        timeZone: TZ,
        day: '2-digit', month: '2-digit',
        hour: '2-digit', minute: '2-digit'
    });
}

// ===================== TEMA =====================
function toggleTheme() {
    const isDark = document.body.dataset.theme === 'dark';
    document.body.dataset.theme = isDark ? '' : 'dark';
    document.querySelector('.btn-theme i').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
}

// ===================== CONFIG =====================
function saveConfig() {
    const e = document.getElementById("empty-weight").value;
    const f = document.getElementById("full-weight").value;
    if (!e || !f) { alert("Ingresa ambos pesos"); return; }
    localStorage.setItem("empty", e);
    localStorage.setItem("full",  f);
    updateUI();
    loadChart();
}

// ===================== BATERÍA =====================
function updateBattery(voltage) {
    let pct = ((voltage - 3.3) / (4.5 - 3.3)) * 100;
    pct = Math.max(0, Math.min(100, pct));
    document.getElementById("bat-level").style.width = pct + "%";
    document.getElementById("bat-text").innerText = pct.toFixed(0) + "%";
    const bar = document.getElementById("bat-level");
    if      (pct < 20) bar.style.background = "var(--danger)";
    else if (pct < 50) bar.style.background = "var(--warning)";
    else               bar.style.background = "var(--accent)";
}

// ===================== GAUGE =====================
const ARC_LENGTH = Math.PI * 90; // 282.74

function updateGauge(pct) {
    const fill   = document.getElementById("gauge-fill");
    const filled = (pct / 100) * ARC_LENGTH;
    fill.style.strokeDasharray = `${filled} ${ARC_LENGTH}`;
    document.getElementById("gauge-pct").innerText = pct.toFixed(0) + "%";
    const pctEl = document.getElementById("gauge-pct");
    if      (pct < 20) { fill.style.stroke = "var(--danger)";  pctEl.style.color = "var(--danger)";  }
    else if (pct < 50) { fill.style.stroke = "var(--warning)"; pctEl.style.color = "var(--warning)"; }
    else               { fill.style.stroke = "var(--primary)"; pctEl.style.color = "var(--primary)"; }
}

// ===================== DÍAS ESTIMADOS =====================
async function updateDaysRemaining(currentNet) {
    const daysEl = document.getElementById("days-remaining");

    if (!device || currentNet <= 0) {
        daysEl.innerText = "—";
        daysEl.className = "info-box-value";
        return;
    }

    try {
        const since24h = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
        const { data } = await db.from("sensor_data")
            .select("created_at, weight")
            .filter("device_id", "eq", device)
            .gte("created_at", since24h)
            .order("created_at", { ascending: true });

        if (!data || data.length < 2) {
            daysEl.innerText = "Sin datos suficientes";
            daysEl.className = "info-box-value";
            return;
        }

        const empty       = parseFloat(localStorage.getItem("empty") || 0);
        const first       = parseFloat(data[0].weight)                - empty;
        const last        = parseFloat(data[data.length - 1].weight)  - empty;
        const consumed24h = first - last; // kg consumidos en 24h

        if (consumed24h <= 0.01) {
            daysEl.innerText = "Sin consumo en 24h";
            daysEl.className = "info-box-value";
            return;
        }

        const days = currentNet / consumed24h;

        // Color según urgencia
        let cls = "info-box-value highlight";
        if      (days < 3)  cls = "info-box-value danger";
        else if (days < 7)  cls = "info-box-value warning";

        daysEl.innerText  = "~" + days.toFixed(1) + " días";
        daysEl.className  = cls;

    } catch (e) {
        console.error("Error días estimados:", e);
        daysEl.innerText = "Error de cálculo";
    }
}

// ===================== CHART =====================
const ctx   = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Gas (kg)',
            data: [],
            borderColor: "#6366f1",
            borderWidth: 2,
            tension: 0.4,
            pointRadius: 3,
            pointBackgroundColor: "#6366f1",
            fill: true,
            backgroundColor: 'rgba(99,102,241,0.08)'
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(1)} kg` }}
        },
        scales: {
            y: {
                beginAtZero: false,
                ticks: { color: '#94a3b8', callback: v => v.toFixed(1) + ' kg' },
                grid: { color: 'rgba(148,163,184,0.15)' }
            },
            x: {
                ticks: { color: '#94a3b8', maxTicksLimit: 8 },
                grid: { display: false }
            }
        }
    }
});

// ===================== PLAN =====================
async function getPlan() {
    if (!device) return;
    const { data } = await db.from("devices")
        .select("plan").filter("device_mac", "eq", device).maybeSingle();
    const p = (data?.plan || "free").toUpperCase();
    document.getElementById("plan-badge").innerText = "PLAN " + p;
}

// ===================== HISTORIAL =====================
async function loadChart() {
    if (!device) return;
    const empty = parseFloat(localStorage.getItem("empty") || 0);
    const { data } = await db.from("sensor_data")
        .select("created_at, weight")
        .filter("device_id", "eq", device)
        .order("created_at", { ascending: false })
        .limit(30);
    if (data && data.length) {
        const rev = data.reverse();
        chart.data.labels = rev.map(d => fmtShort(d.created_at));
        chart.data.datasets[0].data = rev.map(d => Math.max(0, parseFloat(d.weight) - empty));
        chart.update();
    }
}

// ===================== ACTUALIZAR UI =====================
async function updateUI() {
    if (!device) {
        document.getElementById("gauge-pct").innerText = "Sin MAC";
        document.getElementById("last-update-gauge").innerText = "Agrega ?device=MAC a la URL";
        return;
    }
    try {
        const { data } = await db.from("sensor_data")
            .select("*").filter("device_id", "eq", device)
            .order("created_at", { ascending: false }).limit(1);

        if (!data?.[0]) {
            document.getElementById("last-update-gauge").innerText = "Sin datos aún";
            document.getElementById("last-reading").innerText = "—";
            return;
        }
        const d = data[0];

        // Batería
        updateBattery(parseFloat(d.battery_voltage || 4.0));

        // Peso neto y porcentaje
        const empty   = parseFloat(localStorage.getItem("empty") || 0);
        const full    = parseFloat(localStorage.getItem("full")  || 0);
        const w       = parseFloat(d.weight) || 0;
        const net     = w > empty ? w - empty : 0;
        const pct     = full > empty ? (net / (full - empty)) * 100 : 0;
        const safePct = Math.max(0, Math.min(100, pct));

        // ── VISOR DIGITAL: 1 solo decimal ──
        document.getElementById("digital").innerText = net.toFixed(1);
        updateGauge(safePct);

        // Fecha/hora última lectura
        const ts = fmtDate(d.created_at);
        document.getElementById("last-update-gauge").innerText = "Actualizado: " + ts;
        document.getElementById("last-reading").innerText = ts + " (CLT)";

        // Días estimados
        await updateDaysRemaining(net);

    } catch (e) {
        console.error("Error Supabase:", e);
        document.getElementById("last-update-gauge").innerText = "Error de conexión";
    }
}

// ===================== INIT =====================
const savedEmpty = localStorage.getItem("empty");
const savedFull  = localStorage.getItem("full");
if (savedEmpty) document.getElementById("empty-weight").value = savedEmpty;
if (savedFull)  document.getElementById("full-weight").value  = savedFull;

updateUI();
loadChart();
getPlan();

setInterval(() => { updateUI(); loadChart(); }, 30000);

// ── Service Worker ──
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
        .then(reg => { reg.update(); })
        .catch(err => console.error('[SW]', err));
    if ('caches' in window) {
        caches.keys().then(keys =>
            keys.filter(k => k !== 'smartgas-v5').forEach(k => caches.delete(k))
        );
    }
}
</script>

</body>
</html>
