<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGas Pro | Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #10b981;
            --danger: #ef4444;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            transition: background 0.3s;
        }

        .container { width: 100%; max-width: 1000px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.4rem; font-weight: 700; }
        .logo i { color: var(--primary); }

        /* BATERÍA */
        .battery-status {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .battery-shell {
            width: 35px;
            height: 18px;
            border: 2px solid var(--text-muted);
            border-radius: 4px;
            position: relative;
            padding: 2px;
        }

        .battery-shell::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 4px;
            width: 3px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 0 2px 2px 0;
        }

        .battery-level {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 1px;
            transition: width 0.5s, background 0.5s;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: var(--shadow);
        }

        /* SEMI-GAUGE */
        .gauge-container {
            position: relative;
            width: 260px;
            height: 140px; /* Altura reducida para semicírculo */
            margin: 0 auto;
            overflow: hidden;
        }

        svg.gauge { width: 100%; height: 260px; transform: rotate(180deg); }
        .gauge circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .gauge .bg { stroke: var(--border); stroke-dasharray: 141.4 282.7; } /* Mitad del perímetro */
        .gauge .fill { 
            stroke: var(--primary); 
            stroke-dasharray: 0 282.7; 
            transition: stroke-dasharray 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gauge-info {
            position: absolute;
            bottom: 5px;
            left: 0; right: 0;
            text-align: center;
        }

        .gauge-info span { font-size: 2.2rem; font-weight: 800; color: var(--text-main); }
        .gauge-info label { display: block; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .digital-weight { font-size: 2.8rem; font-weight: 800; color: var(--primary); margin-top: 10px; text-align: center; }

        /* PLANES Y CONFIG */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            color: var(--text-main);
            outline: none;
        }
        .btn {
            background: var(--primary);
            color: white; border: none; padding: 14px;
            border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%;
        }

        .plans { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .plan-btn {
            padding: 10px; border: 1px solid var(--border); border-radius: 12px;
            text-align: center; cursor: pointer; font-size: 0.75rem; font-weight: 600;
        }
        .plan-btn:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }

        .chart-area { height: 250px; margin-top: 20px; }

        [data-theme="dark"] .theme-icon::before { content: "\f185"; }
        .theme-icon::before { font-family: "Font Awesome 6 Free"; font-weight: 900; content: "\f186"; }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <header>
        <div class="logo">
            <i class="fas fa-gas-pump"></i>
            <span>SmartGas <small style="font-weight: 300;">PRO</small></span>
        </div>
        
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="battery-status">
                <div class="battery-shell"><div id="bat-level" class="battery-level"></div></div>
                <span id="bat-text" style="font-size: 0.8rem; font-weight: 600;">--%</span>
            </div>
            <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; color:var(--text-main); font-size:1.2rem;">
                <i class="theme-icon"></i>
            </button>
        </div>
    </header>

    <div class="grid">
        <!-- MONITOR -->
        <div class="card" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div id="plan-badge" style="background:rgba(99,102,241,0.1); color:var(--primary); padding:5px 15px; border-radius:20px; font-size:0.7rem; font-weight:700; margin-bottom:20px;">PLAN CARGANDO</div>
            
            <div class="gauge-container">
                <svg class="gauge" viewBox="0 0 100 100">
                    <circle class="bg" cx="50" cy="50" r="45"></circle>
                    <circle id="gauge-fill" class="fill" cx="50" cy="50" r="45"></circle>
                </svg>
                <div class="gauge-info">
                    <span id="gauge-pct">0%</span>
                    <label>Nivel Actual</label>
                </div>
            </div>

            <div class="digital-weight">
                <span id="digital">0.00</span><small style="font-size:1rem; color:var(--text-muted); margin-left:5px;">kg</small>
            </div>
        </div>

        <!-- CONFIG -->
        <div class="card">
            <h3 style="margin-bottom:20px; font-size:1rem;">Configuración</h3>
            <div class="input-group">
                <label>Peso Vacío (kg)</label>
                <input type="number" id="empty-weight" step="0.1">
            </div>
            <div class="input-group">
                <label>Peso Lleno (kg)</label>
                <input type="number" id="full-weight" step="0.1">
            </div>
            <button class="btn" onclick="saveConfig()"><i class="fas fa-save"></i> Guardar</button>

            <div class="plans">
                <div class="plan-btn" onclick="pagar('free')">FREE<br><small>24h</small></div>
                <div class="plan-btn" onclick="pagar('hogar')">HOGAR<br><small>30d</small></div>
                <div class="plan-btn" onclick="pagar('empresa')">PRO<br><small>6m</small></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-bottom:15px; font-size:1rem;">Historial de consumo</h3>
        <div class="chart-area">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script>
// --- LÓGICA DE DATOS ---
const params = new URLSearchParams(window.location.search);
const device = params.get("device") || "";

const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function toggleTheme() {
    document.body.dataset.theme = document.body.dataset.theme === "dark" ? "light" : "dark";
}

function saveConfig() {
    localStorage.setItem("empty", document.getElementById("empty-weight").value);
    localStorage.setItem("full", document.getElementById("full-weight").value);
    location.reload();
}

// BATERÍA: Asumimos rango 3.3V (0%) a 4.5V (100%) para 3xAA
function updateBattery(voltage) {
    let pct = ((voltage - 3.3) / (4.5 - 3.3)) * 100;
    pct = Math.max(0, Math.min(100, pct));
    document.getElementById("bat-level").style.width = pct + "%";
    document.getElementById("bat-text").innerText = pct.toFixed(0) + "%";
    
    // Color de batería
    const bar = document.getElementById("bat-level");
    if(pct < 20) bar.style.background = "var(--danger)";
    else if(pct < 50) bar.style.background = "#f59e0b";
    else bar.style.background = "var(--accent)";
}

const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ 
        data: [], borderColor: "#6366f1", borderWidth: 3, tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.1)' 
    }]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false, ticks: {color: '#94a3b8'}}, x: { ticks: {color: '#94a3b8'}} } }
});

async function getPlan(){
    const { data } = await db.from("devices").select("plan").filter("device_mac", "eq", device).maybeSingle();
    const p = (data?.plan || "free").toUpperCase();
    document.getElementById("plan-badge").innerText = "PLAN " + p;
    return p.toLowerCase();
}

setInterval(async () => {
    try {
        const { data } = await db.from("sensor_data").select("*").filter("device_id", "eq", device).order("created_at", {ascending:false}).limit(1);
        if(!data?.[0]) return;
        const d = data[0];

        // Batería
        updateBattery(parseFloat(d.battery_voltage || 4.0));

        // Pesos
        const empty = parseFloat(localStorage.getItem("empty") || 0);
        const full = parseFloat(localStorage.getItem("full") || 0);
        const w = parseFloat(d.weight) || 0;
        const net = w > empty ? w - empty : 0;
        const pct = full > empty ? (net / (full - empty)) * 100 : 0;
        const safePct = Math.max(0, Math.min(100, pct));

        // Update UI
        document.getElementById("digital").innerText = net.toFixed(2);
        document.getElementById("gauge-pct").innerText = safePct.toFixed(0) + "%";
        
        // Semicírculo Math: Perímetro completo es 282.7. Semicírculo es 141.3.
        const offset = (safePct / 100) * 141.3;
        document.getElementById("gauge-fill").style.strokeDasharray = `${offset} 282.7`;

    } catch (e) { console.error(e); }
}, 5000);

// Resto de funciones (pagar, loadChart, etc.) se mantienen igual que en tu versión anterior
async function loadChart(){
    const empty = parseFloat(localStorage.getItem("empty") || 0);
    const { data } = await db.from("sensor_data").select("*").filter("device_id", "eq", device).order("created_at", {ascending:false}).limit(20);
    if(data) {
        chart.data.labels = data.reverse().map(d => new Date(d.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
        chart.data.datasets[0].data = data.map(d => Math.max(0, d.weight - empty));
        chart.update();
    }
}

// Init
const e = localStorage.getItem("empty");
const f = localStorage.getItem("full");
if(e) document.getElementById("empty-weight").value = e;
if(f) document.getElementById("full-weight").value = f;
loadChart();
getPlan();
</script>

</body>
</html>
