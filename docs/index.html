<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMARTGAS - CONECTA NETWORK</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f7fa;}
.container{max-width:1200px;margin:auto;padding:20px;}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.digital{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;border-radius:10px;text-align:center;}
.digital-value{font-size:60px;}
.plan{display:flex;gap:10px;}
.plan div{flex:1;padding:10px;border:1px solid #ccc;text-align:center;cursor:pointer;}
.active{border:2px solid #667eea;}
button{padding:10px;margin-top:10px;cursor:pointer;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-box" style="
position:fixed;top:0;left:0;width:100%;height:100%;
background:#f5f7fa;display:flex;justify-content:center;align-items:center;
z-index:9999;">
<div style="background:white;padding:40px;border-radius:10px;width:300px;text-align:center;">
<h2>🔐 SmartGas Login</h2>
<input id="email" placeholder="Email" style="width:100%;padding:10px;margin-top:10px;">
<input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin-top:10px;">
<button onclick="login()" style="width:100%;">Entrar</button>
</div>
</div>

<div class="container">

<div class="card">
<h2>🔥 SMARTGAS - CONECTA NETWORK</h2>
</div>

<!-- PLANES -->
<div class="card">
<div class="plan">
<div id="plan-free" onclick="selectPlan('free')">FREE</div>
<div id="plan-hogar" onclick="pagar('hogar')">HOGAR 💳</div>
<div id="plan-empresa" onclick="pagar('empresa')">EMPRESA 💳</div>
</div>
</div>

<!-- DASHBOARD -->
<div class="grid">
<div class="card">
<h3>Porcentaje</h3>
<h1 id="percent">0%</h1>
</div>

<div class="card">
<h3>Peso Neto</h3>
<div class="digital">
<div id="weight" class="digital-value">0.00</div>
kg
</div>
</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<!-- CONFIG -->
<div class="card">
<h3>⚙️ Configuración</h3>
<input id="emptyWeight" placeholder="Peso vacío" type="number">
<input id="fullWeight" placeholder="Peso lleno" type="number">
<button onclick="saveWeights()">Guardar</button>
<button onclick="resetWeights()">Reset</button>
</div>

</div>

<script>

// ================= CONFIG =================
const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let device = null;

// ================= LOGIN =================
async function login(){
  const { error } = await db.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){ alert("Error login"); return; }

  document.getElementById("login-box").style.display="none";
  initApp();
}

// AUTO LOGIN
window.addEventListener("load", async ()=>{
  const { data } = await db.auth.getSession();
  if(data.session){
    document.getElementById("login-box").style.display="none";
    initApp();
  }
});

// ================= AUTO ASIGNACIÓN =================
async function autoAssignDevice(){

  const { data: userData } = await db.auth.getUser();
  const user = userData.user;

  const { data } = await db
    .from("devices")
    .select("*")
    .is("user_id", null)
    .limit(1);

  if(data && data.length > 0){
    await db.from("devices")
      .update({
        user_id: user.id,
        assigned: true
      })
      .eq("id", data[0].id);

    console.log("✅ Dispositivo asignado");
  }
}

// ================= INIT =================
async function initApp(){

  await autoAssignDevice();

  const { data } = await db.from("devices").select("*").limit(1);

  if(!data.length){
    alert("No hay dispositivo");
    return;
  }

  device = data[0].device_mac;

  loadPlan();
  loadData();
  loadChart();
}

// ================= DATOS =================
async function loadData(){

  const { data } = await db
    .from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .order("created_at",{ascending:false})
    .limit(1);

  if(!data.length) return;

  const d = data[0];

  const empty = parseFloat(localStorage.getItem("emptyWeight")) || d.empty_weight;
  const full = parseFloat(localStorage.getItem("fullWeight")) || d.full_weight;

  const net = d.weight - empty;
  const percent = (net/(full-empty))*100;

  weight.innerText = net.toFixed(2);
  percentEl.innerText = percent.toFixed(1)+"%";
}

// ================= CHART =================
const chart = new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:[],datasets:[{data:[]}]}
});

async function loadChart(){

  const since = new Date(Date.now()-86400000).toISOString();

  const { data } = await db
    .from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .gte("created_at", since)
    .limit(96);

  chart.data.labels = data.map(d=>new Date(d.created_at).toLocaleTimeString());
  chart.data.datasets[0].data = data.map(d=> d.weight - d.empty_weight);

  chart.update();
}

// ================= PLAN =================
async function loadPlan(){
  const { data } = await db.from("devices").select("plan").limit(1);
  if(data.length){
    document.getElementById("plan-"+data[0].plan).classList.add("active");
  }
}

async function selectPlan(plan){
  await db.from("devices")
    .update({plan})
    .eq("device_mac",device);
  loadPlan();
}

// ================= STRIPE =================
async function pagar(plan){

  const res = await fetch("https://TU_BACKEND/create-checkout",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ plan, device })
  });

  const data = await res.json();
  window.location = data.url;
}

// ================= PESOS =================
function saveWeights(){
  localStorage.setItem("emptyWeight",emptyWeight.value);
  localStorage.setItem("fullWeight",fullWeight.value);
}

function resetWeights(){
  localStorage.clear();
}

// ================= VAR =================
const weight = document.getElementById("weight");
const percentEl = document.getElementById("percent");

// REFRESH
setInterval(loadData,5000);
setInterval(loadChart,60000);

</script>

</body>
</html>
