<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGas Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family:'Segoe UI'; background:#f4f6f9; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }
.plans { display:flex; gap:10px; }
.plan-btn { flex:1; padding:10px; border:none; border-radius:10px; color:white; cursor:pointer; }
.free { background:#999; }
.hogar { background:#48bb78; }
.empresa { background:#667eea; }
</style>
</head>

<body>

<script>
const params = new URLSearchParams(window.location.search);
const device = params.get("device");

if (!device) {
  document.body.innerHTML = "Falta device";
  throw "No device";
}
</script>

<div class="card">
  <h3>Plan actual</h3>
  <div id="plan-label"></div>
</div>

<div class="card">
  <h3>Planes</h3>
  <div class="plans">

    <button class="plan-btn free" onclick="pagar('free')">
      FREE
    </button>

    <button class="plan-btn hogar" onclick="pagar('hogar')">
      HOGAR
    </button>

    <button class="plan-btn empresa" onclick="pagar('empresa')">
      EMPRESA
    </button>

  </div>
</div>

<script>

// SUPABASE
const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NzQ3NTcxOCwiZXhwIjoyMDgzMDUxNzE4fQ.mTxI4WWV5OpIFyvgL_kp-W7R7XvqDXP-DTAqnZ0qxKo";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =======================
// PAGOS
// =======================

async function pagar(plan){

  console.log("CLICK PLAN:", plan);

  if(!device){
    alert("Device no definido");
    return;
  }

  // FREE
  if(plan === "free"){
    try {

      const res = await fetch(
        `${SUPABASE_URL}/functions/v1/cambiar-plan-free`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": "Bearer " + SUPABASE_ANON_KEY
          },
          body: JSON.stringify({ device })
        }
      );

      if(!res.ok){
        console.error(await res.text());
        alert("Error al cambiar a FREE");
        return;
      }

      alert("Plan cambiado a FREE");
      location.reload();

    } catch(err){
      console.error(err);
      alert("Error inesperado");
    }

    return;
  }

  // STRIPE
  try {

    const res = await fetch(
      `${SUPABASE_URL}/functions/v1/crear-pago`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ device, plan })
      }
    );

    if(!res.ok){
      console.error(await res.text());
      alert("Error al iniciar pago");
      return;
    }

    const data = await res.json();

    if(data.url){
      window.location.href = data.url;
    } else {
      alert("Error en checkout");
    }

  } catch(err){
    console.error(err);
    alert("Error inesperado");
  }
}

// =======================
// PLAN ACTUAL
// =======================

async function getPlan(){

  const { data } = await db
    .from("devices")
    .select("plan, expires_at")
    .eq("device_mac", device)
    .maybeSingle();

  if(!data){
    document.getElementById("plan-label").innerText = "FREE";
    return;
  }

  if(data.expires_at){
    if(new Date() > new Date(data.expires_at)){
      document.getElementById("plan-label").innerText = "FREE";
      return;
    }
  }

  document.getElementById("plan-label").innerText =
    (data.plan || "free").toUpperCase();
}

// INIT
getPlan();

</script>

</body>
</html>
