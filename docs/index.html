<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGas Dashboard</title>

<!-- LIBRERÍAS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 20px;
}
.container {
    max-width: 1000px;
    margin: auto;
}
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.status-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
}
.status-connected { background: #48bb78; }
.status-disconnected { background: #f56565; }
canvas { max-height: 300px; }
</style>
</head>

<body>

<div class="container">

<div class="card">
    <h2>SmartGas 1.0</h2>
    <span id="supabase-indicator" class="status-indicator status-disconnected"></span>
    <span id="supabase-status">Supabase: Desconectado</span>
</div>

<div class="card">
    <h3>Peso Neto</h3>
    <h1 id="digital-weight">0.00 kg</h1>
    <h3 id="percentage-display">0%</h3>
</div>

<div class="card">
    <h3>Eventos Últimas 24 Horas</h3>
    <canvas id="consumptionChart"></canvas>
</div>

</div>

<script>

// =============================
// CONFIGURACIÓN
// =============================
const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_ANON_KEY = "PON_AQUI_TU_ANON_KEY_REAL";
const DEVICE_MAC = "44:1D:64:BC:A7:3C";

let supabaseClient;
let chart;
let historicalCache = new Map();

// =============================
// INICIALIZAR SUPABASE
// =============================
function initSupabase() {
    const { createClient } = window.supabase;
    supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById("supabase-indicator").className =
        "status-indicator status-connected";
    document.getElementById("supabase-status").textContent =
        "Supabase: Conectado";

    subscribeRealtime();
}

// =============================
// SUSCRIPCIÓN REALTIME
// =============================
function subscribeRealtime() {
    supabaseClient
        .channel("sensor_changes")
        .on("postgres_changes", {
            event: "INSERT",
            schema: "public",
            table: "sensor_data",
            filter: `device_id=eq.${DEVICE_MAC}`
        }, payload => {
            processNewData(payload.new);
        })
        .subscribe();
}

// =============================
// PROCESAR NUEVO DATO
// =============================
function processNewData(data) {

    const totalWeight = parseFloat(data.weight);
    const timestamp = new Date(data.timestamp).getTime();

    const empty = 5;
    const full = 13;

    const netWeight = Math.max(0, totalWeight - empty);
    const percentage = (netWeight / (full - empty)) * 100;

    historicalCache.set(timestamp, netWeight);

    updateDisplay(netWeight, percentage);
    updateChart();
}

// =============================
// ACTUALIZAR DISPLAY
// =============================
function updateDisplay(netWeight, percentage) {
    document.getElementById("digital-weight").textContent =
        netWeight.toFixed(2) + " kg";

    document.getElementById("percentage-display").textContent =
        percentage.toFixed(1) + "%";
}

// =============================
// INICIALIZAR GRÁFICO
// =============================
function initChart() {

    const ctx = document
        .getElementById("consumptionChart")
        .getContext("2d");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: [],
            datasets: [{
                label: "Peso Neto (kg)",
                data: [],
                borderColor: "#667eea",
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
}

// =============================
// ACTUALIZAR GRÁFICO
// =============================
function updateChart() {

    const sorted = Array.from(historicalCache.entries())
        .sort((a, b) => a[0] - b[0]);

    chart.data.labels = sorted.map(([ts]) => {
        const d = new Date(ts);
        return d.getHours() + ":" +
               d.getMinutes().toString().padStart(2, "0");
    });

    chart.data.datasets[0].data =
        sorted.map(([_, value]) => value);

    chart.update();
}

// =============================
// CARGAR HISTORIAL 24H
// =============================
async function loadHistory() {

    const since = new Date(Date.now() - 24*60*60*1000).toISOString();

    const { data } = await supabaseClient
        .from("sensor_data")
        .select("weight,timestamp")
        .eq("device_id", DEVICE_MAC)
        .gte("timestamp", since)
        .order("timestamp", { ascending: true });

    if (!data) return;

    data.forEach(row => {
        const ts = new Date(row.timestamp).getTime();
        historicalCache.set(ts, parseFloat(row.weight) - 5);
    });

    updateChart();
}

// =============================
// CARGAR ÚLTIMO REGISTRO
// =============================
async function loadLatest() {

    const { data } = await supabaseClient
        .from("sensor_data")
        .select("weight,timestamp")
        .eq("device_id", DEVICE_MAC)
        .order("timestamp", { ascending: false })
        .limit(1);

    if (!data || data.length === 0) return;

    const row = data[0];

    const totalWeight = parseFloat(row.weight);
    const empty = 5;
    const full = 13;

    const netWeight = Math.max(0, totalWeight - empty);
    const percentage = (netWeight / (full - empty)) * 100;

    updateDisplay(netWeight, percentage);
}

// =============================
// INICIO
// =============================
document.addEventListener("DOMContentLoaded", async () => {
    initChart();
    initSupabase();
    await loadHistory();
    await loadLatest();
});

</script>

</body>
</html>
