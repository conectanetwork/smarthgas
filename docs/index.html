<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartGas Home | Dashboard</title>

  <!-- ═══════════════════════════════════════════
       PWA — Manifest + Apple meta tags
  ═══════════════════════════════════════════ -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SmartGas">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

  <!-- ═══════════════════════════════════════════
       Fuentes y librerías externas
  ═══════════════════════════════════════════ -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ══════════════════════════════════════
       Variables de tema
    ══════════════════════════════════════ */
    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #273549;
      --border:    #334155;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --accent:    #38bdf8;       /* electric blue  */
      --navy:      #1e3a5f;       /* navy logo      */
      --success:   #22c55e;
      --warning:   #f59e0b;
      --danger:    #ef4444;
      --radius:    14px;
      --shadow:    0 4px 24px rgba(0,0,0,.35);
    }
    [data-theme="light"] {
      --bg:        #f0f4f8;
      --surface:   #ffffff;
      --surface2:  #e8eef5;
      --border:    #cbd5e1;
      --text:      #0f172a;
      --muted:     #64748b;
    }

    /* ══════════════════════════════════════
       Reset + Base
    ══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .3s, color .3s;
    }
    input { font-family: inherit; }
    button { cursor: pointer; font-family: inherit; }

    /* ══════════════════════════════════════
       Layout principal
    ══════════════════════════════════════ */
    .app-wrapper {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 0 32px;
    }

    /* ══════════════════════════════════════
       Header
    ══════════════════════════════════════ */
    .header {
      background: var(--navy);
      padding: 0 20px;
      height: 60px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
      overflow: hidden;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 100%;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: block;
    }
    .header-titles {
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.2;
    }
    .header-titles .brand    { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: .3px; margin: 0; }
    .header-titles .subbrand { font-size: 10px; font-weight: 500; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin: 2px 0 0; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* Badge de plan */
    .plan-badge {
      display: inline-flex;
      align-items: center;
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      background: rgba(56,189,248,.15);
      color: var(--accent);
      border: 1px solid rgba(56,189,248,.35);
      padding: 4px 10px;
      border-radius: 20px;
      line-height: 1;
      white-space: nowrap;
    }

    /* Batería */
    .battery-wrap {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1;
    }
    .battery-body {
      width: 28px; height: 13px;
      border: 2px solid var(--muted);
      border-radius: 3px;
      position: relative;
      padding: 2px;
      flex-shrink: 0;
    }
    .battery-body::after {
      content: '';
      position: absolute; right: -5px; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 6px;
      background: var(--muted);
      border-radius: 0 2px 2px 0;
    }
    .battery-fill {
      height: 100%; width: 75%;
      background: var(--success);
      border-radius: 1px;
      transition: width .5s, background .3s;
    }
    #bat-text { line-height: 1; }

    /* Botón tema */
    .btn-theme {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: none; border: none;
      color: var(--muted); font-size: 16px;
      width: 32px; height: 32px;
      border-radius: 6px;
      transition: color .2s;
      flex-shrink: 0;
    }
    .btn-theme:hover { color: var(--accent); }

    /* ══════════════════════════════════════
       Banner de instalación PWA
    ══════════════════════════════════════ */
    #install-banner {
      display: none;
      background: linear-gradient(135deg, var(--navy), #0c2340);
      border-bottom: 1px solid rgba(56,189,248,.25);
      padding: 12px 20px;
      align-items: center;
      gap: 12px;
    }
    #install-banner.visible { display: flex; }
    #install-banner .install-icon { font-size: 22px; }
    #install-banner .install-text { flex: 1; }
    #install-banner .install-text strong { display: block; font-size: 13px; color: #fff; }
    #install-banner .install-text span   { font-size: 11px; color: var(--muted); }
    .btn-install {
      background: var(--accent); color: #0f172a;
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 12px; font-weight: 700;
      white-space: nowrap; transition: opacity .2s;
    }
    .btn-install:hover { opacity: .85; }
    .btn-dismiss {
      background: none; border: none;
      color: var(--muted); font-size: 18px;
      padding: 2px 4px;
    }

    /* ══════════════════════════════════════
       Contenido principal
    ══════════════════════════════════════ */
    .main {
      padding: 20px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ══════════════════════════════════════
       DESKTOP LAYOUT (≥ 768px)
    ══════════════════════════════════════ */
    @media (min-width: 768px) {

      body { font-size: 15px; }

      /* Header más amplio en desktop */
      .header { padding: 0 40px; height: 68px; }
      .header-titles .brand    { font-size: 20px; }
      .header-titles .subbrand { font-size: 11px; }
      .logo-icon { width: 42px; height: 42px; }
      .plan-badge { font-size: 11px; padding: 5px 13px; }
      .header-right { gap: 16px; }

      /* Grid de 2 columnas en desktop */
      .main {
        padding: 28px 32px 0;
        display: grid;
        grid-template-columns: 340px 1fr;
        grid-template-rows: auto auto;
        gap: 20px;
        align-items: start;
      }

      /* Gauge ocupa columna izquierda, ambas filas */
      .gauge-card {
        grid-column: 1;
        grid-row: 1 / 3;
      }

      /* Config en columna derecha fila 1 */
      .config-card {
        grid-column: 2;
        grid-row: 1;
      }

      /* Chart en columna derecha fila 2 */
      .chart-card {
        grid-column: 2;
        grid-row: 2;
      }

      /* Gauge en desktop */
      .gauge-wrap { width: 260px; }
      .gauge-pct  { font-size: 52px; }
      .weight-display { font-size: 36px; }

        /* Chart más alto en desktop */
      .chart-container { height: 240px; position: relative; width: 100%; }

      /* Config grid 2 columnas en desktop */
      .config-grid { grid-template-columns: 1fr 1fr; }

      /* Plan pills horizontal */
      .plan-pills { gap: 12px; }
      .pill { padding: 10px 8px; }
    }

    /* ══════════════════════════════════════
       WIDE DESKTOP (≥ 1100px)
    ══════════════════════════════════════ */
    @media (min-width: 1100px) {
      .main {
        grid-template-columns: 400px 1fr;
        padding: 32px 48px 0;
        gap: 24px;
      }
      .gauge-wrap  { width: 300px; }
      .gauge-pct   { font-size: 60px; }
      .weight-display { font-size: 42px; }
      .chart-container { height: 280px; }
    }

    /* ── Card base ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Gauge Card ── */
    .gauge-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .gauge-card .card-title { width: 100%; text-align: left; }
    .gauge-wrap {
      position: relative;
      width: 200px;
      margin: 0 auto 12px;
      flex-shrink: 0;
    }
    .gauge-wrap svg { display: block; width: 100%; height: auto; }
    .gauge-bg   { fill: none; stroke: var(--surface2); stroke-width: 14; }
    .gauge-fill {
      fill: none; stroke: var(--accent); stroke-width: 14;
      stroke-linecap: round;
      stroke-dasharray: 0 251.2;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dasharray .8s cubic-bezier(.4,0,.2,1), stroke .4s;
    }
    .gauge-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
    }
    .gauge-pct   { font-size: 36px; font-weight: 700; color: var(--text); line-height: 1; }
    .gauge-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .weight-display {
      font-size: 28px; font-weight: 700; color: var(--accent);
      margin-top: 8px;
      text-align: center;
      width: 100%;
    }
    .weight-display span { font-size: 14px; font-weight: 400; color: var(--muted); }

    /* Indicador de estado */
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px; color: var(--muted);
      background: var(--surface2);
      padding: 4px 14px; border-radius: 20px;
      margin-top: 10px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    .status-dot.online { background: var(--success); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    /* ── Config Card ── */
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .input-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .input-group input {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; color: var(--text); font-size: 14px;
      transition: border .2s;
    }
    .input-group input:focus { outline: none; border-color: var(--accent); }

    .btn-save {
      width: 100%; background: var(--accent); color: #0f172a;
      border: none; border-radius: 8px;
      padding: 10px; font-size: 14px; font-weight: 700;
      transition: opacity .2s, transform .1s;
    }
    .btn-save:hover  { opacity: .85; }
    .btn-save:active { transform: scale(.98); }

    /* Plan pills */
    .plan-pills {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .pill {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 10px; font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      line-height: 1.3;
    }
    .pill .pill-name {
      display: block;
      font-size: 12px;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 3px;
      line-height: 1;
    }
    .pill.active { border-color: var(--accent); background: rgba(56,189,248,.1); color: var(--accent); }
    .pill.active .pill-name { color: var(--accent); }

    /* ── Chart Card ── */
    .chart-container {
      height: 180px;
      position: relative;
      width: 100%;
      min-height: 160px;
    }
    .chart-container canvas {
      display: block !important;
      width: 100% !important;
    }

    /* ══════════════════════════════════════
       Toast de actualización disponible
    ══════════════════════════════════════ */
    #update-toast {
      display: none;
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 12px; padding: 12px 18px;
      box-shadow: var(--shadow); z-index: 999;
      align-items: center; gap: 12px;
      font-size: 13px; white-space: nowrap;
    }
    #update-toast.visible { display: flex; }
    .btn-update {
      background: var(--accent); color: #0f172a;
      border: none; border-radius: 7px;
      padding: 5px 12px; font-size: 12px; font-weight: 700;
    }

    /* ══════════════════════════════════════
       Offline banner
    ══════════════════════════════════════ */
    #offline-banner {
      display: none;
      background: #7c2d12;
      color: #fed7aa;
      text-align: center;
      font-size: 12px; padding: 8px;
    }
    #offline-banner.visible { display: block; }

    /* ══════════════════════════════════════
       Responsive tweaks
    ══════════════════════════════════════ */
    @media (max-width: 360px) {
      .gauge-pct { font-size: 28px; }
      .weight-display { font-size: 22px; }
    }
  </style>
</head>

<body>
<div class="app-wrapper">

  <!-- ═══════ HEADER ═══════ -->
  <header class="header">
    <div class="header-logo">
      <!-- Logo SVG inline (pin + llama + WiFi arcos) -->
      <svg class="logo-icon" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Cuerpo del pin -->
        <path d="M50 5 C27 5 8 24 8 47 C8 72 50 115 50 115 C50 115 92 72 92 47 C92 24 73 5 50 5Z" fill="#1e3a5f"/>
        <!-- Llama (blanca) -->
        <path d="M50 85 C42 75 36 65 38 55 C40 48 45 52 46 46 C47 40 50 34 50 34 C50 34 53 40 54 46 C55 52 60 48 62 55 C64 65 58 75 50 85Z" fill="white"/>
        <!-- Arcos WiFi (electric blue) -->
        <path d="M38 44 C38 44 44 38 50 38 C56 38 62 44 62 44" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" fill="none"/>
        <path d="M33 38 C33 38 41 30 50 30 C59 30 67 38 67 38" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
      </svg>
      <div class="header-titles">
        <span class="brand">SmartGas</span>
        <span class="subbrand">— Home —</span>
      </div>
    </div>

    <div class="header-right">
      <span class="plan-badge" id="plan-badge">PLAN FREE</span>
      <div class="battery-wrap">
        <div class="battery-body"><div class="battery-fill" id="bat-level"></div></div>
        <span id="bat-text">--%</span>
      </div>
      <button class="btn-theme" onclick="toggleTheme()" title="Cambiar tema">
        <i class="fa-solid fa-circle-half-stroke"></i>
      </button>
    </div>
  </header>

  <!-- ═══════ BANNER PWA INSTALL ═══════ -->
  <div id="install-banner">
    <span class="install-icon">📲</span>
    <div class="install-text">
      <strong>Instalar SmartGas</strong>
      <span>Accede rápido desde tu pantalla de inicio</span>
    </div>
    <button class="btn-install" id="btn-install-pwa">Instalar</button>
    <button class="btn-dismiss" id="btn-dismiss-banner" title="Cerrar">×</button>
  </div>

  <!-- ═══════ OFFLINE BANNER ═══════ -->
  <div id="offline-banner">
    <i class="fa-solid fa-wifi-slash"></i> Sin conexión — mostrando últimos datos guardados
  </div>

  <!-- ═══════ CONTENIDO ═══════ -->
  <main class="main">

    <!-- Gauge de nivel -->
    <div class="card gauge-card" id="gauge-card">
      <p class="card-title">Nivel de Gas</p>
      <div class="gauge-wrap">
        <svg viewBox="0 0 100 100">
          <circle class="gauge-bg"   cx="50" cy="50" r="40"/>
          <circle class="gauge-fill" cx="50" cy="50" r="40" id="gauge-fill"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-pct"  id="gauge-pct">--%</div>
          <div class="gauge-label">Nivel</div>
        </div>
      </div>
      <div class="weight-display" id="digital">--<span> kg neto</span></div>
      <div class="status-indicator">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Conectando...</span>
      </div>
    </div>

    <!-- Configuración -->
    <div class="card config-card">
      <p class="card-title">Configuración</p>
      <div class="config-grid">
        <div class="input-group">
          <label>Peso Vacío (kg)</label>
          <input type="number" id="empty-weight" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
          <label>Peso Lleno (kg)</label>
          <input type="number" id="full-weight" placeholder="0.00" step="0.01">
        </div>
      </div>
      <button class="btn-save" onclick="saveConfig()">
        <i class="fa-solid fa-floppy-disk"></i> Guardar
      </button>
      <div class="plan-pills">
        <div class="pill" data-plan="free">
          <span class="pill-name">FREE</span>24h
        </div>
        <div class="pill" data-plan="hogar">
          <span class="pill-name">HOGAR</span>30d
        </div>
        <div class="pill" data-plan="pro">
          <span class="pill-name">PRO</span>6m
        </div>
      </div>
    </div>

    <!-- Historial -->
    <div class="card chart-card">
      <p class="card-title">Historial de consumo</p>
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>

  </main><!-- /main -->
</div><!-- /app-wrapper -->

<!-- Toast actualización -->
<div id="update-toast">
  <span>🔄 Nueva versión disponible</span>
  <button class="btn-update" id="btn-update">Actualizar</button>
</div>

<!-- ═══════════════════════════════════════════════════════════
     SCRIPTS
═══════════════════════════════════════════════════════════ -->
<script>
// ── Configuración ────────────────────────────────────────────
const SUPABASE_URL      = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo";
const db     = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const device = localStorage.getItem("device_id") || "DEFAULT_DEVICE";

// ── Tema ─────────────────────────────────────────────────────
function toggleTheme() {
  const next = document.body.dataset.theme === "dark" ? "light" : "dark";
  document.body.dataset.theme = next;
  localStorage.setItem("theme", next);
}
// Restaurar tema guardado
const savedTheme = localStorage.getItem("theme");
if (savedTheme) document.body.dataset.theme = savedTheme;

// ── Configuración de pesos ────────────────────────────────────
function saveConfig() {
  localStorage.setItem("empty", document.getElementById("empty-weight").value);
  localStorage.setItem("full",  document.getElementById("full-weight").value);
  showToast("✅ Configuración guardada");
  loadChart();
}
function showToast(msg, ms = 2000) {
  const t = document.getElementById("update-toast");
  t.querySelector("span").textContent = msg;
  t.querySelector("#btn-update").style.display = "none";
  t.classList.add("visible");
  setTimeout(() => t.classList.remove("visible"), ms);
}

// Restaurar config guardada
const savedEmpty = localStorage.getItem("empty");
const savedFull  = localStorage.getItem("full");
if (savedEmpty) document.getElementById("empty-weight").value = savedEmpty;
if (savedFull)  document.getElementById("full-weight").value  = savedFull;

// ── Batería ───────────────────────────────────────────────────
// Rango 3×AA: 3.3V (0%) → 4.5V (100%)
function updateBattery(voltage) {
  let pct = ((voltage - 3.3) / (4.5 - 3.3)) * 100;
  pct = Math.max(0, Math.min(100, pct));
  const bar  = document.getElementById("bat-level");
  const text = document.getElementById("bat-text");
  bar.style.width = pct + "%";
  text.innerText  = pct.toFixed(0) + "%";
  if      (pct < 20) bar.style.background = "var(--danger)";
  else if (pct < 50) bar.style.background = "var(--warning)";
  else               bar.style.background = "var(--success)";
}

// ── Gauge SVG ────────────────────────────────────────────────
// Circunferencia: 2π×40 = 251.2
const CIRCUM = 251.2;
function updateGauge(pct) {
  const safe   = Math.max(0, Math.min(100, pct));
  const offset = (safe / 100) * CIRCUM;
  const fill   = document.getElementById("gauge-fill");
  fill.style.strokeDasharray = `${offset} ${CIRCUM}`;
  // Color semáforo
  if      (safe < 20) fill.style.stroke = "var(--danger)";
  else if (safe < 40) fill.style.stroke = "var(--warning)";
  else                fill.style.stroke = "var(--accent)";
  document.getElementById("gauge-pct").innerText = safe.toFixed(0) + "%";
}

// ── Plan ─────────────────────────────────────────────────────
async function getPlan() {
  try {
    const { data } = await db.from("devices").select("plan")
      .filter("device_mac", "eq", device).maybeSingle();
    const p = (data?.plan || "free").toLowerCase();
    document.getElementById("plan-badge").innerText = "PLAN " + p.toUpperCase();
    document.querySelectorAll(".pill").forEach(el => {
      el.classList.toggle("active", el.dataset.plan === p);
    });
    return p;
  } catch { return "free"; }
}

// ── Chart ────────────────────────────────────────────────────
const ctx   = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      data: [],
      borderColor: "#38bdf8",
      borderWidth: 2.5,
      tension: 0.4,
      pointRadius: 3,
      pointBackgroundColor: "#38bdf8",
      fill: true,
      backgroundColor: 'rgba(56,189,248,0.08)'
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    resizeDelay: 100,
    plugins: { legend: { display: false } },
    scales: {
      y: { beginAtZero: false, ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { color: 'rgba(148,163,184,.1)' } },
      x: { ticks: { color: '#94a3b8', font: { size: 10 }, maxRotation: 0 }, grid: { display: false } }
    }
  }
});

async function loadChart() {
  const empty = parseFloat(localStorage.getItem("empty") || 0);
  try {
    const { data } = await db.from("sensor_data").select("*")
      .filter("device_id", "eq", device)
      .order("created_at", { ascending: false })
      .limit(20);
    if (data?.length) {
      const sorted = data.reverse();
      chart.data.labels = sorted.map(d =>
        new Date(d.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      );
      chart.data.datasets[0].data = sorted.map(d => Math.max(0, parseFloat(d.weight) - empty));
      chart.update();
    }
  } catch (e) { console.warn("Chart error:", e); }
}

// ── Polling de datos en tiempo real ──────────────────────────
let lastUpdate = null;

async function fetchLatest() {
  try {
    const { data } = await db.from("sensor_data").select("*")
      .filter("device_id", "eq", device)
      .order("created_at", { ascending: false })
      .limit(1);

    if (!data?.[0]) return;
    const d = data[0];

    // Estado online
    const dot  = document.getElementById("status-dot");
    const stxt = document.getElementById("status-text");
    const ts   = new Date(d.created_at);
    const ago  = Math.round((Date.now() - ts) / 60000);
    dot.className = "status-dot online";
    stxt.innerText = ago < 2 ? "En línea" : `Última lectura: hace ${ago} min`;

    // Batería
    updateBattery(parseFloat(d.battery_voltage || 4.0));

    // Peso neto y gauge
    const empty = parseFloat(localStorage.getItem("empty") || 0);
    const full  = parseFloat(localStorage.getItem("full")  || 0);
    const w     = parseFloat(d.weight) || 0;
    const net   = w > empty ? w - empty : 0;
    const pct   = full > empty ? (net / (full - empty)) * 100 : 0;

    document.getElementById("digital").innerHTML =
      `${net.toFixed(2)}<span> kg neto</span>`;
    updateGauge(pct);

    // Guardar en cache offline
    localStorage.setItem("lastData", JSON.stringify({ net, pct, voltage: d.battery_voltage, ts: d.created_at }));
    lastUpdate = d.created_at;

  } catch (e) {
    console.warn("Fetch error:", e);
    // Offline: mostrar últimos datos cacheados
    const cached = JSON.parse(localStorage.getItem("lastData") || "null");
    if (cached) {
      document.getElementById("digital").innerHTML =
        `${cached.net.toFixed(2)}<span> kg neto *</span>`;
      updateGauge(cached.pct);
    }
  }
}

// Polling cada 5 segundos
fetchLatest();
setInterval(fetchLatest, 5000);

// Recargar chart cada 60 segundos
loadChart();
setInterval(loadChart, 60000);

// Init plan
getPlan();

// ── Offline / Online detection ────────────────────────────────
function updateOnlineStatus() {
  const banner = document.getElementById("offline-banner");
  if (navigator.onLine) banner.classList.remove("visible");
  else                  banner.classList.add("visible");
}
window.addEventListener("online",  updateOnlineStatus);
window.addEventListener("offline", updateOnlineStatus);
updateOnlineStatus();

// ═══════════════════════════════════════════════════════════════
//  PWA — Service Worker + Install Banner
// ═══════════════════════════════════════════════════════════════
let deferredInstallPrompt = null;

// Registro del Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => {
        console.log('[SW] Registrado:', reg.scope);

        // Detectar actualización disponible
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // Hay nueva versión → mostrar toast
              const toast    = document.getElementById("update-toast");
              const btnUpd   = document.getElementById("btn-update");
              toast.querySelector("span").textContent = "🔄 Nueva versión disponible";
              btnUpd.style.display = "";
              toast.classList.add("visible");
              btnUpd.addEventListener('click', () => {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
                window.location.reload();
              });
            }
          });
        });
      })
      .catch(err => console.warn('[SW] Error:', err));
  });
}

// Capturar evento beforeinstallprompt (Android/Chrome)
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Mostrar banner solo si no fue descartado antes
  if (!localStorage.getItem("pwa-dismissed")) {
    document.getElementById("install-banner").classList.add("visible");
  }
});

// Botón Instalar
document.getElementById("btn-install-pwa").addEventListener("click", async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if (outcome === "accepted") {
    document.getElementById("install-banner").classList.remove("visible");
  }
  deferredInstallPrompt = null;
});

// Botón Descartar banner
document.getElementById("btn-dismiss-banner").addEventListener("click", () => {
  document.getElementById("install-banner").classList.remove("visible");
  localStorage.setItem("pwa-dismissed", "1");
});

// Ocultar banner si ya está instalada
window.addEventListener('appinstalled', () => {
  document.getElementById("install-banner").classList.remove("visible");
  console.log('[PWA] Instalada correctamente');
});
</script>
