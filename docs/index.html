<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMARTGAS - CONECTA NETWORK</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fa;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.digital{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
}

.digital-value{
  font-size:60px;
}

.plan{
  display:flex;
  gap:10px;
}

.plan div{
  flex:1;
  padding:10px;
  border:1px solid #ccc;
  text-align:center;
  cursor:pointer;
}

.active{
  border:2px solid #667eea;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-box" style="
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#f5f7fa;
display:flex;justify-content:center;align-items:center;
z-index:9999;
">
<div style="background:white;padding:40px;border-radius:10px;width:300px;text-align:center;">
<h2>🔐 SmartGas Login</h2>

<input id="email" placeholder="Email" style="width:100%;padding:10px;margin-top:10px;">
<input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin-top:10px;">

<button onclick="login()" style="margin-top:15px;width:100%;padding:10px;">Entrar</button>
</div>
</div>

<div class="container">

<div class="card">
<h2>🔥 SMARTGAS - CONECTA NETWORK</h2>
</div>

<!-- PLANES -->
<div class="card">
<div class="plan">
<div id="plan-free" onclick="selectPlan('free')">FREE</div>
<div id="plan-hogar" onclick="selectPlan('hogar')">HOGAR</div>
<div id="plan-empresa" onclick="selectPlan('empresa')">EMPRESA</div>
</div>
</div>

<!-- DASHBOARD -->
<div class="grid">

<div class="card">
<h3>Porcentaje</h3>
<h1 id="percent">0%</h1>
</div>

<div class="card">
<h3>Peso</h3>
<div class="digital">
<div id="weight" class="digital-value">0.00</div>
kg neto
</div>
</div>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<!-- CONFIG PESOS -->
<div class="card">
<h3>⚙️ Configuración de Pesos</h3>

<input id="emptyWeight" placeholder="Peso vacío" type="number">
<input id="fullWeight" placeholder="Peso lleno" type="number">

<button onclick="saveWeights()">Guardar</button>
<button onclick="resetWeights()">Reset</button>
</div>

</div>

<script>

// CONFIG
const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let device = null;

// LOGIN
async function login(){
  const { data, error } = await db.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){ alert("Error login"); return; }

  document.getElementById("login-box").style.display="none";
  initApp();
}

// AUTO LOGIN
window.addEventListener("load", async ()=>{
  const { data } = await db.auth.getSession();

  if(data.session){
    document.getElementById("login-box").style.display="none";
    initApp();
  }
});

// INIT
async function initApp(){

  const { data } = await db.from("devices").select("*").limit(1);

  if(!data || data.length===0){
    alert("No tienes dispositivos");
    return;
  }

  device = data[0].device_mac;

  loadPlan();
  loadData();
  loadChart();
}

// DATA
async function loadData(){

  const { data } = await db
    .from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .order("created_at",{ascending:false})
    .limit(1);

  if(!data.length) return;

  const d = data[0];

  const empty = parseFloat(localStorage.getItem("emptyWeight")) || d.empty_weight;
  const full = parseFloat(localStorage.getItem("fullWeight")) || d.full_weight;

  const net = d.weight - empty;
  const percent = (net/(full-empty))*100;

  weight.innerText = net.toFixed(2);
  percentEl.innerText = percent.toFixed(1)+"%";
}

// CHART
const chart = new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:[],datasets:[{data:[]}]}
});

async function loadChart(){

  const since = new Date(Date.now()-86400000).toISOString();

  const { data } = await db
    .from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .gte("created_at", since)
    .limit(96);

  chart.data.labels = data.map(d=>new Date(d.created_at).toLocaleTimeString());
  chart.data.datasets[0].data = data.map(d=> d.weight - d.empty_weight);
  chart.update();
}

// PLAN
async function loadPlan(){
  const { data } = await db.from("devices").select("plan").limit(1);
  if(data.length){
    document.getElementById("plan-"+data[0].plan).classList.add("active");
  }
}

async function selectPlan(plan){
  await db.from("devices").update({plan}).eq("device_mac",device);
  loadPlan();
}

// PESOS
function saveWeights(){
  localStorage.setItem("emptyWeight",emptyWeight.value);
  localStorage.setItem("fullWeight",fullWeight.value);
}

function resetWeights(){
  localStorage.clear();
}

// VARIABLES
const weight = document.getElementById("weight");
const percentEl = document.getElementById("percent");

</script>

</body>
</html>
