<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMARTGAS - CONECTA NETWORK</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#f5f7fa;
  --card:white;
  --text:#2d3748;
  --accent:#667eea;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
}

.container{
  max-width:1300px;
  margin:auto;
  padding:20px;
}

.header{
  background:var(--card);
  padding:25px;
  border-radius:15px;
  text-align:center;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:15px;
  padding:25px;
}

.digital{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  padding:40px;
  border-radius:12px;
  text-align:center;
}

.digital-value{
  font-size:60px;
}

.plan-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.plan-card{
  padding:10px;
  border:1px solid #ccc;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

.plan-card.active{
  border:2px solid var(--accent);
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>🔥 SMARTGAS - CONECTA NETWORK</h2>
</div>

<!-- PLANES -->
<div class="card">
<div class="plan-grid">
<div class="plan-card" id="plan-free" onclick="selectPlan('free')">FREE</div>
<div class="plan-card" id="plan-hogar" onclick="selectPlan('hogar')">HOGAR</div>
<div class="plan-card" id="plan-empresa" onclick="selectPlan('empresa')">EMPRESA</div>
</div>
</div>

<!-- DASHBOARD -->
<div class="grid">

<div class="card">
<h3>Nivel</h3>
<h1 id="percent">0%</h1>
</div>

<div class="card">
<h3>Peso</h3>
<div class="digital">
<div id="weight" class="digital-value">0.00</div>
kg neto
</div>
</div>

</div>

<!-- CHART -->
<div class="card">
<canvas id="chart"></canvas>
</div>

<!-- CONFIG PESOS -->
<div class="card">

<h3>⚙️ Configuración de Pesos</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:10px;">

<div>
<label>Peso Vacío (kg)</label>
<input id="emptyWeight" type="number" step="0.01" value="5"
style="width:100%;padding:10px;">
</div>

<div>
<label>Peso Lleno (kg)</label>
<input id="fullWeight" type="number" step="0.01" value="13"
style="width:100%;padding:10px;">
</div>

</div>

<div style="margin-top:20px;text-align:center;">
<button onclick="saveWeights()">💾 Guardar</button>
<button onclick="resetWeights()">🔄 Reset</button>
</div>

</div>

</div>

<script>

// ================= CONFIG =================
const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_KEY = "TU_KEY_AQUI";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const device = new URLSearchParams(window.location.search).get("device");

// ================= PESOS =================
function loadWeights(){
  document.getElementById("emptyWeight").value =
    localStorage.getItem("emptyWeight") || 5;

  document.getElementById("fullWeight").value =
    localStorage.getItem("fullWeight") || 13;
}

async function saveWeights(){
  const empty = parseFloat(emptyWeight.value);
  const full = parseFloat(fullWeight.value);

  localStorage.setItem("emptyWeight",empty);
  localStorage.setItem("fullWeight",full);

  await db.from("devices")
    .update({empty_weight:empty, full_weight:full})
    .eq("device_mac",device);

  alert("Guardado");
}

function resetWeights(){
  localStorage.clear();
  loadWeights();
}

// ================= DATA =================
async function loadData(){

  const { data } = await db
    .from("sensor_data")
    .select("*")
    .eq("device_id",device)
    .order("created_at",{ascending:false})
    .limit(1);

  if(!data || data.length==0) return;

  const d = data[0];

  const empty = parseFloat(localStorage.getItem("emptyWeight")) || d.empty_weight;
  const full = parseFloat(localStorage.getItem("fullWeight")) || d.full_weight;

  const net = d.weight - empty;
  const percent = (net/(full-empty))*100;

  weight.innerText = net.toFixed(2);
  percentEl.innerText = percent.toFixed(1)+"%";
}

// ================= CHART =================
const ctx = document.getElementById("chart");
const chart = new Chart(ctx,{
  type:"line",
  data:{labels:[],datasets:[{data:[]}]}
});

async function loadChart(){

  const since = new Date(Date.now()-86400000).toISOString();

  const { data } = await db
    .from("sensor_data")
    .select("*")
    .eq("device_id",device)
    .gte("created_at",since)
    .order("created_at",{ascending:true})
    .limit(96);

  chart.data.labels = data.map(d=>new Date(d.created_at).toLocaleTimeString());
  chart.data.datasets[0].data =
    data.map(d=> d.weight - d.empty_weight);

  chart.update();
}

// ================= PLAN =================
async function loadPlan(){
  const { data } = await db
    .from("devices")
    .select("plan")
    .eq("device_mac",device)
    .limit(1);

  if(data.length){
    document.getElementById("plan-"+data[0].plan).classList.add("active");
  }
}

async function selectPlan(plan){
  await db.from("devices")
    .update({plan})
    .eq("device_mac",device);

  loadPlan();
}

// ================= INIT =================
const weight = document.getElementById("weight");
const percentEl = document.getElementById("percent");

loadWeights();
loadData();
loadChart();
loadPlan();

setInterval(loadData,5000);
setInterval(loadChart,60000);

</script>

</body>
</html>
