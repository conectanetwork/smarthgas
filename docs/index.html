<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGas Dashboard</title>

<!-- LIBRERÍAS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 20px;
}
.container {
    max-width: 1000px;
    margin: auto;
}
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.status-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
}
.status-connected { background: #48bb78; }
.status-disconnected { background: #f56565; }
canvas { max-height: 300px; }

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    cursor: pointer;
    font-size: 14px;
}
button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
    <h2>SmartGas 1.0</h2>
    <span id="supabase-indicator" class="status-indicator status-disconnected"></span>
    <span id="supabase-status">Supabase: Desconectado</span>
</div>

<div class="card">
    <h3>Peso Neto</h3>
    <h1 id="digital-weight">0.00 kg</h1>
    <h3 id="percentage-display">0%</h3>
</div>

<div class="card">
    <h3>Eventos Últimas 24 Horas</h3>
    <canvas id="consumptionChart"></canvas>
</div>

<div class="card">
    <h3>Planes de Suscripción</h3>
    <button id="btnHogar">Plan Hogar - $4.900</button>
    <br><br>
    <button id="btnEmpresa">Plan Empresa - $14.900</button>
</div>

</div>

<script>

// =============================
// CONFIGURACIÓN
// =============================
const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo";  // 🔥 Pega aquí tu anon key real
const DEVICE_MAC = "44:1D:64:BC:A7:3C";

let supabaseClient;
let chart;
let historicalCache = new Map();

// =============================
// INICIALIZAR SUPABASE
// =============================
function initSupabase() {
    const { createClient } = window.supabase;
    supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById("supabase-indicator").className =
        "status-indicator status-connected";
    document.getElementById("supabase-status").textContent =
        "Supabase: Conectado";

    subscribeRealtime();
}

// =============================
// REALTIME
// =============================
function subscribeRealtime() {
    supabaseClient
        .channel("sensor_changes")
        .on("postgres_changes", {
            event: "INSERT",
            schema: "public",
            table: "sensor_data",
            filter: `device_id=eq.${DEVICE_MAC}`
        }, payload => {
            processNewData(payload.new);
        })
        .subscribe();
}

// =============================
// PROCESAR NUEVO DATO
// =============================
function processNewData(data) {
    const totalWeight = parseFloat(data.weight);
    const timestamp = new Date(data.timestamp).getTime();

    const empty = 5;
    const full = 13;

    const netWeight = Math.max(0, totalWeight - empty);
    const percentage = (netWeight / (full - empty)) * 100;

    historicalCache.set(timestamp, netWeight);

    updateDisplay(netWeight, percentage);
    updateChart();
}

// =============================
// DISPLAY
// =============================
function updateDisplay(netWeight, percentage) {
    document.getElementById("digital-weight").textContent =
        netWeight.toFixed(2) + " kg";
    document.getElementById("percentage-display").textContent =
        percentage.toFixed(1) + "%";
}

// =============================
// GRÁFICO
// =============================
function initChart() {
    const ctx = document.getElementById("consumptionChart").getContext("2d");
    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: [],
            datasets: [{
                label: "Peso Neto (kg)",
                data: [],
                borderColor: "#667eea",
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 0
            }]
        },
        options: { responsive: true }
    });
}

function updateChart() {
    const sorted = Array.from(historicalCache.entries())
        .sort((a, b) => a[0] - b[0]);

    chart.data.labels = sorted.map(([ts]) => {
        const d = new Date(ts);
        return d.getHours() + ":" +
               d.getMinutes().toString().padStart(2, "0");
    });

    chart.data.datasets[0].data =
        sorted.map(([_, value]) => value);

    chart.update();
}

// =============================
// STRIPE SUSCRIPCIÓN
// =============================
async function subscribe(priceId) {

    console.log("Iniciando suscripción:", priceId);

    const res = await fetch(
        "https://uooftjtllmsnugdcldvc.supabase.co/functions/v1/create-checkout-session",
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                priceId: priceId,
                deviceMac: DEVICE_MAC
            })
        }
    );

    const data = await res.json();

    if (data.url) {
        window.location.href = data.url;
    } else {
        alert("Error creando sesión Stripe");
        console.log(data);
    }
}

// =============================
// INICIO
// =============================
document.addEventListener("DOMContentLoaded", () => {

    initChart();
    initSupabase();

    document.getElementById("btnHogar")
        .addEventListener("click", () => {
            subscribe("price_1T4kaJ2LgsgSmvp8lM2X5oxi");
        });

    document.getElementById("btnEmpresa")
        .addEventListener("click", () => {
            subscribe("price_1T4ksR2LgsgSmvp8lfYmzzMV");
        });

});
</script>

</body>
</html>
