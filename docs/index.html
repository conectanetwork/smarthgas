<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGas Dashboard - Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg-primary:#f5f7fa;
  --bg-secondary:white;
  --text-primary:#2d3748;
  --text-secondary:#718096;
  --border-color:rgba(0,0,0,0.05);
  --shadow:0 4px 20px rgba(0,0,0,0.08);
  --accent:#667eea;
  --success:#48bb78;
  --warning:#f6ad55;
  --danger:#f56565;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:var(--bg-primary);
  margin:0;
}

.container{
  max-width:1300px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

.title{font-size:2rem;font-weight:200}

/* STATUS */
.status-bar{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:15px;
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.status-item{font-size:0.9rem}

/* PLANES */
.plan-panel{
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.plan-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.plan-card{
  border:1px solid #ddd;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.plan-card.active{
  border:2px solid var(--accent);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:var(--shadow);
}

/* DIGITAL */
.digital{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  padding:40px;
  border-radius:15px;
  text-align:center;
}

.digital-value{
  font-size:60px;
}

/* GAUGE */
.gauge{
  text-align:center;
}

.gauge-value{
  font-size:40px;
}

/* CHART */
.chart{
  margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="title">🔥 SMARTGAS - CONECTA NETWORK</div>
</div>

<div class="status-bar">
  <div class="status-item" id="esp32-status">ESP32: ...</div>
  <div class="status-item" id="supabase-status">Cloud: ...</div>
  <div class="status-item" id="battery-status">Batería: --%</div>
</div>

<!-- PLANES -->
<div class="plan-panel">
  <b>Plan</b>
  <div class="plan-grid">
    <div class="plan-card" id="plan-free" onclick="selectPlan('free')">FREE</div>
    <div class="plan-card" id="plan-hogar" onclick="selectPlan('hogar')">HOGAR</div>
    <div class="plan-card" id="plan-empresa" onclick="selectPlan('empresa')">EMPRESA</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="grid">

<div class="card gauge">
  <div>Nivel</div>
  <div class="gauge-value" id="percent">0%</div>
</div>

<div class="card">
  <div>Peso</div>
  <div class="digital">
    <div class="digital-value" id="weight">0.00</div>
    kg neto
  </div>
</div>

</div>

<div class="card chart">
  <canvas id="chart"></canvas>
</div>

</div>

<script>

const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const device = new URLSearchParams(window.location.search).get("device");

// ================= DATA =================
async function loadData(){

  const { data } = await db
    .from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .order("created_at",{ascending:false})
    .limit(1);

  if(!data || data.length===0) return;

  const d = data[0];

  const net = d.weight - d.empty_weight;
  const percent = (net/(d.full_weight-d.empty_weight))*100;

  document.getElementById("weight").innerText = net.toFixed(2);
  document.getElementById("percent").innerText = percent.toFixed(1)+"%";
  document.getElementById("battery-status").innerText = "Batería: "+d.battery_percentage+"%";

  document.getElementById("esp32-status").innerText = "ESP32: OK";
  document.getElementById("supabase-status").innerText = "Cloud: OK";
}

// ================= CHART =================
let chart = new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:[],datasets:[{data:[]}]}
});

async function loadChart(){

  const since = new Date(Date.now()-86400000).toISOString();

  const { data } = await db
    .from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .gte("created_at",since)
    .order("created_at",{ascending:true})
    .limit(96);

  if(!data) return;

  chart.data.labels = data.map(d =>
    new Date(d.created_at).toLocaleTimeString()
  );

  chart.data.datasets[0].data =
    data.map(d => d.weight - d.empty_weight);

  chart.update();
}

// ================= PLAN =================
async function loadPlan(){
  const { data } = await db
    .from("devices")
    .select("plan")
    .eq("device_mac", device)
    .limit(1);

  if(data && data.length){
    highlightPlan(data[0].plan);
  }
}

function highlightPlan(plan){
  document.querySelectorAll(".plan-card").forEach(p=>p.classList.remove("active"));
  const el = document.getElementById("plan-"+plan);
  if(el) el.classList.add("active");
}

async function selectPlan(plan){
  await db.from("devices")
    .update({plan})
    .eq("device_mac",device);

  highlightPlan(plan);
}

// ================= LOOP =================
loadData();
loadChart();
loadPlan();

setInterval(loadData,5000);
setInterval(loadChart,60000);

</script>

</body>
</html>
