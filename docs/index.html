<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartGas Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#222;
}

[data-theme="dark"] {
  --bg:#1a202c;
  --card:#2d3748;
  --text:#ffffff;
}

body {
  margin:0;
  font-family:'Segoe UI';
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header {
  background:var(--card);
  padding:15px;
  text-align:center;
  position:relative;
}

.toggle {
  position:absolute;
  right:20px;
  top:15px;
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card {
  background:var(--card);
  border-radius:12px;
  padding:15px;
}

/* GAUGE */
.gauge svg {
  width:150px;
}

/* DIGITAL */
.digital-box {
  background:#667eea;
  padding:20px;
  border-radius:10px;
  text-align:center;
  color:white;
}
#digital {
  font-size:32px;
}

/* CHART */
.chart-container {
  grid-column:1/-1;
  height:200px;
}

/* BATTERY */
.battery {
  height:10px;
  background:#ccc;
  border-radius:10px;
}
.fill {
  height:100%;
  background:green;
}
</style>
</head>

<body>

<script>
// 🔒 CONTROL ACCESO
const params = new URLSearchParams(window.location.search);
const device = params.get("device");

if (!device) {
  document.body.innerHTML = "<h2 style='text-align:center'>Acceso inválido</h2>";
  throw "No device";
}
</script>

<div class="header">
  SMARTGAS - CONECTA NETWORK
  <button class="toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="grid">

<!-- GAUGE -->
<div class="card gauge">
  <svg viewBox="0 0 200 120">
    <path d="M20 100 A80 80 0 0 1 180 100"
      stroke="#eee" stroke-width="10" fill="none"/>
    <path id="gauge-fill"
      d="M20 100 A80 80 0 0 1 180 100"
      stroke="green" stroke-width="10" fill="none"
      stroke-dasharray="251.2"
      stroke-dashoffset="251.2"/>
  </svg>
  <div id="gauge-value">0%</div>
</div>

<!-- DIGITAL -->
<div class="card">
  <div class="digital-box">
    <div id="digital">0.00</div>
    kg
  </div>
</div>

<!-- CHART -->
<div class="card chart-container">
  <canvas id="chart"></canvas>
</div>

<!-- BATTERY -->
<div class="card">
  <div class="battery">
    <div id="battery-fill" class="fill"></div>
  </div>
  <div id="battery-text"></div>
</div>

</div>

<script>

// 🔥 SUPABASE
const db = supabase.createClient(
  "https://uooftjtllmsnugdcldvc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo"
);

// 🌙 THEME
function toggleTheme(){
  document.body.dataset.theme =
    document.body.dataset.theme === "dark" ? "light":"dark";
}

// 📊 CHART
const chart = new Chart(document.getElementById("chart"),{
  type:'line',
  data:{labels:[],datasets:[{data:[],borderColor:"#667eea"}]},
  options:{
    responsive:true,
    maintainAspectRatio:false,
    scales:{
      y:{
        min:0,
        ticks:{callback:(v)=>v.toFixed(2)}
      },
      x:{
        ticks:{
          callback:(v,i)=> i%4==0 ? chart.data.labels[i] : ""
        }
      }
    }
  }
});

// 🔥 OBTENER DATOS (device_id o device_mac)
async function getData(){

  let res = await db.from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .order("created_at",{ascending:false})
    .limit(1);

  if (!res.data || res.data.length === 0) {
    res = await db.from("sensor_data")
      .select("*")
      .eq("device_mac", device)
      .order("created_at",{ascending:false})
      .limit(1);
  }

  return res.data;
}

// 🔄 LOOP PRINCIPAL
setInterval(async()=>{

  const data = await getData();
  if(!data || data.length===0) return;

  const d = data[0];

  const empty = 5;
  const full = 15;

  const net = d.weight - empty;
  const percent = (net/(full-empty))*100;

  document.getElementById("digital").innerText = net.toFixed(2);
  document.getElementById("gauge-value").innerText = percent.toFixed(1)+"%";

  const offset = 251.2 - (percent/100)*251.2;
  document.getElementById("gauge-fill").style.strokeDashoffset = offset;

  document.getElementById("battery-fill").style.width = d.battery_percentage+"%";
  document.getElementById("battery-text").innerText = d.battery_percentage+"%";

},5000);


// 📈 GRÁFICO 24H
async function loadChart(){

  let res = await db.from("sensor_data")
    .select("*")
    .eq("device_id", device);

  if (!res.data || res.data.length===0){
    res = await db.from("sensor_data")
      .select("*")
      .eq("device_mac", device);
  }

  const data = res.data;
  if(!data) return;

  chart.data.labels = data.map(d=>{
    const t = new Date(d.created_at);
    return t.getHours()+":00";
  });

  chart.data.datasets[0].data = data.map(d=>d.weight - 5);

  chart.update();
}

loadChart();
setInterval(loadChart,60000);

</script>

</body>
</html>
