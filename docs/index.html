<script>
console.log("🚀 SmartGas 1.0 Comercial");

const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_ANON_KEY = "TU_ANON_KEY_AQUI";

// 🔹 MAC del dispositivo (debe coincidir con el firmware)
const DEVICE_MAC = "44:1D:64:BC:A7:3C";

let supabaseClient;
let chart;
let historicalCache = new Map();

// =============================
// INICIALIZAR SUPABASE
// =============================
function initSupabase() {
    const { createClient } = supabase;
    supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById("supabase-indicator").className =
        "status-indicator status-connected";
    document.getElementById("supabase-status").textContent =
        "Supabase: Conectado";

    subscribeRealtime();
}

// =============================
// SUSCRIPCIÓN TIEMPO REAL
// =============================
function subscribeRealtime() {
    supabaseClient
        .channel("sensor_data_changes")
        .on(
            "postgres_changes",
            {
                event: "INSERT",
                schema: "public",
                table: "sensor_data",
                filter: `device_mac=eq.${DEVICE_MAC}`,
            },
            (payload) => {
                processNewData(payload.new);
            }
        )
        .subscribe();
}

// =============================
// PROCESAR NUEVO EVENTO
// =============================
function processNewData(data) {
    const weight = parseFloat(data.weight);
    const battery = parseFloat(data.battery_percentage);
    const timestamp = new Date(data.timestamp).getTime();

    const { netWeight, percentage } = calculateNet(weight);

    historicalCache.set(timestamp, {
        netWeight,
        timestamp,
    });

    updateDisplays(netWeight, percentage, battery);
    updateChart();
}

// =============================
// OBTENER ÚLTIMO DATO
// =============================
async function fetchLatest() {
    const { data } = await supabaseClient
        .from("sensor_data")
        .select("*")
        .eq("device_mac", DEVICE_MAC)
        .order("timestamp", { ascending: false })
        .limit(1);

    if (data && data.length > 0) {
        processNewData(data[0]);
    }
}

// =============================
// OBTENER HISTORIAL 24H
// =============================
async function fetchLast24h() {
    const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

    const { data } = await supabaseClient
        .from("sensor_data")
        .select("weight,timestamp")
        .eq("device_mac", DEVICE_MAC)
        .gte("timestamp", since)
        .order("timestamp", { ascending: true });

    if (!data) return;

    data.forEach((row) => {
        const ts = new Date(row.timestamp).getTime();
        const { netWeight } = calculateNet(parseFloat(row.weight));

        historicalCache.set(ts, {
            netWeight,
            timestamp: ts,
        });
    });

    updateChart();
}

// =============================
// CÁLCULO PESO NETO
// =============================
function calculateNet(totalWeight) {
    const empty = parseFloat(localStorage.getItem("emptyWeight")) || 5;
    const full = parseFloat(localStorage.getItem("fullWeight")) || 13;

    const netWeight = Math.max(0, totalWeight - empty);
    const maxNet = full - empty;
    const percentage = maxNet > 0 ? (netWeight / maxNet) * 100 : 0;

    return { netWeight, percentage };
}

// =============================
// ACTUALIZAR DISPLAY
// =============================
function updateDisplays(netWeight, percentage, battery) {
    document.getElementById("digital-weight").textContent =
        netWeight.toFixed(2);

    document.getElementById("gauge-percentage").textContent =
        percentage.toFixed(1) + "%";

    const circumference = 251.2;
    const offset = circumference - (percentage / 100) * circumference;
    document.getElementById("gauge-fill").style.strokeDashoffset = offset;

    // batería
    document.getElementById("battery-percentage").textContent =
        battery.toFixed(0) + "%";

    document.getElementById("battery-progress-fill").style.width =
        battery + "%";

    document.getElementById("esp32-indicator").className =
        "status-indicator status-connected";
    document.getElementById("esp32-status").textContent =
        "ESP32: Actualizado";
}

// =============================
// GRÁFICO
// =============================
function initChart() {
    const ctx = document.getElementById("consumptionChart");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: [],
            datasets: [
                {
                    label: "Peso Neto (kg)",
                    data: [],
                    borderColor: "#667eea",
                    borderWidth: 2,
                    fill: false,
                    tension: 0.3,
                    pointRadius: 0,
                },
            ],
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true },
            },
        },
    });
}

function updateChart() {
    const sorted = Array.from(historicalCache.entries()).sort(
        (a, b) => a[0] - b[0]
    );

    const labels = [];
    const values = [];

    sorted.forEach(([ts, record]) => {
        const d = new Date(ts);
        labels.push(
            d.getHours().toString().padStart(2, "0") +
                ":" +
                d.getMinutes().toString().padStart(2, "0")
        );
        values.push(record.netWeight);
    });

    chart.data.labels = labels;
    chart.data.datasets[0].data = values;
    chart.update();
}

// =============================
// CONFIGURACIÓN PESOS
// =============================
function saveConfiguration() {
    const empty = document.getElementById("empty-weight").value;
    const full = document.getElementById("full-weight").value;

    localStorage.setItem("emptyWeight", empty);
    localStorage.setItem("fullWeight", full);

    historicalCache.clear();
    fetchLast24h();
}

// =============================
// INICIALIZACIÓN
// =============================
document.addEventListener("DOMContentLoaded", async () => {
    initSupabase();
    initChart();

    await fetchLatest();
    await fetchLast24h();
});
</script>
