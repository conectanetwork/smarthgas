<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartGas Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#222;
}
[data-theme="dark"] {
  --bg:#1a202c;
  --card:#2d3748;
  --text:#ffffff;
}

body {
  margin:0;
  font-family:'Segoe UI';
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header {
  background:var(--card);
  padding:15px;
  text-align:center;
  position:relative;
}
.toggle {
  position:absolute;
  right:20px;
  top:15px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card {
  background:var(--card);
  border-radius:12px;
  padding:15px;
}

/* ALTURA UNIFICADA */
.top-box {
  height:230px; /* MISMA ALTURA */
  display:flex;
  align-items:center;
  justify-content:center;
}

/* GAUGE */
.gauge svg {
  width:220px; /* +2cm aprox */
}

/* DIGITAL */
.digital-box {
  background:#667eea;
  border-radius:10px;
  color:white;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
#digital {
  font-size:42px;
}

/* CHART */
.chart-container {
  grid-column:1/-1;
  height:260px;
}

/* LEFT COLUMN */
.left-column {
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* BATTERY */
.battery {
  height:8px;
  background:#ccc;
  border-radius:10px;
}
.fill {
  height:100%;
  background:green;
}
#battery-text {
  font-size:12px;
  margin-top:5px;
}

/* PLANES */
.plans {
  display:flex;
  gap:10px;
}
.plan-btn {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-size:14px;
}
.hogar { background:#48bb78; }
.empresa { background:#667eea; }

/* CONFIG */
.config input {
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<script>
const params = new URLSearchParams(window.location.search);
const device = params.get("device");

if (!device) {
  document.body.innerHTML = "<h2 style='text-align:center'>Acceso inválido</h2>";
  throw "No device";
}
</script>

<div class="header">
  SMARTGAS - CONECTA NETWORK
  <button class="toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="grid">

<!-- GAUGE -->
<div class="card top-box gauge">
  <svg viewBox="0 0 200 120">
    <path d="M20 100 A80 80 0 0 1 180 100"
      stroke="#eee" stroke-width="10" fill="none"/>
    <path id="gauge-fill"
      d="M20 100 A80 80 0 0 1 180 100"
      stroke="green" stroke-width="10" fill="none"
      stroke-dasharray="251.2"
      stroke-dashoffset="251.2"/>
  </svg>
  <div id="gauge-value"></div>
</div>

<!-- DIGITAL -->
<div class="card top-box">
  <div class="digital-box">
    <div id="digital">0.00</div>
    kg
  </div>
</div>

<!-- CHART -->
<div class="card chart-container">
  <canvas id="chart"></canvas>
</div>

<!-- IZQUIERDA -->
<div class="left-column">

  <div class="card">
    <h3>Batería</h3>
    <div class="battery">
      <div id="battery-fill" class="fill"></div>
    </div>
    <div id="battery-text"></div>
  </div>

  <div class="card">
    <h3>Planes</h3>
    <div class="plans">
      <button class="plan-btn hogar" onclick="pagar('hogar')">Hogar</button>
      <button class="plan-btn empresa" onclick="pagar('empresa')">Empresa</button>
    </div>
  </div>

</div>

<!-- CONFIG -->
<div class="card config">
  <h3>Configuración cilindro</h3>

  <label>Peso vacío</label>
  <input id="empty-weight">

  <label>Peso lleno</label>
  <input id="full-weight">

  <button onclick="saveConfig()">Guardar</button>
</div>

</div>

<script>

const db = supabase.createClient(
  "https://uooftjtllmsnugdcldvc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo"
);

function toggleTheme(){
  document.body.dataset.theme =
    document.body.dataset.theme === "dark" ? "light":"dark";
}

function saveConfig(){
  localStorage.setItem("empty", document.getElementById("empty-weight").value);
  localStorage.setItem("full", document.getElementById("full-weight").value);
  alert("Guardado");
}

async function pagar(plan){
  const res = await fetch("http://localhost:3000/create-checkout-session",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({plan})
  });
  const data = await res.json();
  window.location.href = data.url;
}

const chart = new Chart(document.getElementById("chart"),{
  type:'line',
  data:{labels:[],datasets:[{data:[],borderColor:"#667eea"}]},
  options:{responsive:true,maintainAspectRatio:false}
});

async function getData(){
  let res = await db.from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .limit(1);

  if (!res.data || res.data.length===0){
    res = await db.from("sensor_data")
      .select("*")
      .eq("device_mac", device)
      .limit(1);
  }
  return res.data;
}

setInterval(async()=>{
  const data = await getData();
  if(!data || data.length===0) return;

  const d = data[0];

  const empty = parseFloat(localStorage.getItem("empty")||5);
  const full = parseFloat(localStorage.getItem("full")||15);

  const net = d.weight-empty;
  const percent = (net/(full-empty))*100;

  document.getElementById("digital").innerText = net.toFixed(2);
  document.getElementById("gauge-value").innerText = percent.toFixed(1)+"%";

  const offset = 251.2-(percent/100)*251.2;
  document.getElementById("gauge-fill").style.strokeDashoffset=offset;

  document.getElementById("battery-fill").style.width=d.battery_percentage+"%";
  document.getElementById("battery-text").innerText=d.battery_percentage+"%";

},5000);

</script>

</body>
</html>
