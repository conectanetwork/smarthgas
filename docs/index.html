<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGas Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; padding:20px;}
.container { max-width:600px; margin:auto; }
.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}
input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}
button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:white;
  cursor:pointer;
}
button:hover { opacity:0.9; }
.hidden { display:none; }
</style>
</head>

<body>
<div class="container">

<!-- LOGIN / REGISTER -->
<div id="authCard" class="card">
  <h2>Login / Registro</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Iniciar Sesión</button>
  <br><br>
  <button onclick="register()">Crear Cuenta</button>
</div>

<!-- ACTIVACIÓN -->
<div id="activationCard" class="card hidden">
  <h2>Activar Dispositivo</h2>
  <input id="deviceMac" placeholder="MAC del dispositivo">
  <input id="activationKey" placeholder="Clave de activación">
  <button onclick="activateDevice()">Activar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardCard" class="card hidden">
  <h2>SmartGas Dashboard</h2>
  <p id="deviceInfo"></p>
  <button onclick="logout()">Cerrar sesión</button>
</div>

</div>

<script>

const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co"
const SUPABASE_ANON_KEY = "TU_ANON_KEY_AQUI"

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
)

// ==========================
// AUTH
// ==========================

async function register() {
  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  const { error } = await supabase.auth.signUp({
    email,
    password
  })

  if (error) alert(error.message)
  else alert("Revisa tu correo para confirmar la cuenta")
}

async function login() {
  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  })

  if (error) alert(error.message)
  else checkUser()
}

async function logout() {
  await supabase.auth.signOut()
  location.reload()
}

// ==========================
// ACTIVACIÓN
// ==========================

async function activateDevice() {

  const session = await supabase.auth.getSession()
  const accessToken = session.data.session.access_token

  const deviceMac = document.getElementById("deviceMac").value
  const activationKey = document.getElementById("activationKey").value

  const res = await fetch(
    "https://uooftjtllmsnugdcldvc.supabase.co/functions/v1/activate-device",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + accessToken
      },
      body: JSON.stringify({ deviceMac, activationKey })
    }
  )

  if (res.ok) {
    alert("Dispositivo activado")
    checkUser()
  } else {
    alert("Error activando dispositivo")
  }
}

// ==========================
// VERIFICAR USUARIO
// ==========================

async function checkUser() {

  const { data: { user } } = await supabase.auth.getUser()

  if (!user) return

  document.getElementById("authCard").classList.add("hidden")

  const { data: devices } = await supabase
    .from("devices")
    .select("*")

  if (!devices || devices.length === 0) {
    document.getElementById("activationCard").classList.remove("hidden")
  } else {
    document.getElementById("dashboardCard").classList.remove("hidden")
    document.getElementById("deviceInfo").innerText =
      "Dispositivo: " + devices[0].device_mac +
      " | Plan: " + devices[0].plan
  }
}

// ==========================
// INIT
// ==========================

checkUser()

</script>
</body>
</html>
