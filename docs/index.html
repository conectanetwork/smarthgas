<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartGas Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#222;
}
[data-theme="dark"] {
  --bg:#1a202c;
  --card:#2d3748;
  --text:#ffffff;
}

body { margin:0; font-family:'Segoe UI'; background:var(--bg); color:var(--text); }

.header { background:var(--card); padding:15px; text-align:center; position:relative; }
.toggle { position:absolute; right:20px; top:15px; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:15px; }

.card { background:var(--card); border-radius:12px; padding:15px; }

.top-box { height:230px; display:flex; align-items:center; justify-content:center; }

.gauge svg { width:260px; }

.digital-box {
  background:#667eea; border-radius:10px; color:white;
  width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#digital { font-size:42px; }

.chart-container { grid-column:1/-1; height:260px; }

.left-column { display:flex; flex-direction:column; gap:15px; }

.battery { height:8px; background:#ccc; border-radius:10px; }
.fill { height:100%; }

.plans { display:flex; gap:10px; }
.plan-btn {
  flex:1; padding:12px; border:none; border-radius:10px;
  cursor:pointer; color:white; opacity:0.6;
}

.free { background:#999; }
.hogar { background:#48bb78; }
.empresa { background:#667eea; }

.plan-active {
  opacity:1 !important;
  border:2px solid #000;
}

.config input { width:100%; padding:8px; margin:5px 0 10px; }
</style>
</head>

<body>

<script>
const params = new URLSearchParams(window.location.search);
const device = params.get("device");

if (!device) {
  document.body.innerHTML = "<h2 style='text-align:center'>Acceso inválido</h2>";
  throw "No device";
}
</script>

<div class="header">
  SMARTGAS - CONECTA NETWORK
  <button class="toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="grid">

<!-- GAUGE -->
<div class="card top-box gauge">
  <div>
    <svg viewBox="0 0 240 140">
      <path d="M20 120 A95 95 0 0 1 220 120"
        stroke="#eee" stroke-width="19" fill="none" stroke-linecap="round"/>
      <path id="gauge-fill"
        d="M20 120 A95 95 0 0 1 220 120"
        stroke="green" stroke-width="19" fill="none" stroke-linecap="round"
        stroke-dasharray="298.5" stroke-dashoffset="298.5"/>
    </svg>
    <div id="gauge-value" style="text-align:center;"></div>
  </div>
</div>

<!-- DIGITAL -->
<div class="card top-box">
  <div class="digital-box">
    <div id="digital">0.00</div>
    kg
  </div>
</div>

<!-- CHART -->
<div class="card chart-container">
  <canvas id="chart"></canvas>
</div>

<!-- IZQUIERDA -->
<div class="left-column">

  <div class="card">
    <h3>Batería</h3>
    <div class="battery">
      <div id="battery-fill" class="fill"></div>
    </div>
    <div id="battery-text"></div>
  </div>

  <div class="card">
    <h3>Plan actual</h3>
    <div id="plan-label"></div>
  </div>

  <div class="card">
    <h3>Planes</h3>
    <div class="plans">
      <button class="plan-btn free" onclick="setPlan('free')">Free</button>
      <button class="plan-btn hogar" onclick="setPlan('hogar')">Hogar</button>
      <button class="plan-btn empresa" onclick="setPlan('empresa')">Empresa</button>
    </div>
  </div>

</div>

<!-- CONFIG -->
<div class="card config">
  <h3>Configuración cilindro</h3>

  <label>Peso vacío</label>
  <input id="empty-weight">

  <label>Peso lleno</label>
  <input id="full-weight">

  <button onclick="saveConfig()">Guardar</button>
</div>

</div>

<script>

// SUPABASE
const db = supabase.createClient(
  "https://uooftjtllmsnugdcldvc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo"
);

// THEME
function toggleTheme(){
  document.body.dataset.theme =
    document.body.dataset.theme === "dark" ? "light":"dark";
}

// PLAN
function getPlan(){ return localStorage.getItem("plan") || "free"; }

function setPlan(plan){

  if(plan === "free"){
    if(!confirm("¿Deseas volver al plan FREE (24h)?")) return;
  }

  localStorage.setItem("plan", plan);
  location.reload();
}

function updatePlanUI(){

  const plan = getPlan();

  let text = "FREE (24h)";
  if(plan==="hogar") text="HOGAR (30 días)";
  if(plan==="empresa") text="EMPRESA (6 meses)";

  document.getElementById("plan-label").innerText = text;

  document.querySelectorAll(".plan-btn")
    .forEach(b => b.classList.remove("plan-active"));

  if(plan==="free") document.querySelector(".free").classList.add("plan-active");
  if(plan==="hogar") document.querySelector(".hogar").classList.add("plan-active");
  if(plan==="empresa") document.querySelector(".empresa").classList.add("plan-active");
}

// CONFIG
function saveConfig(){
  const empty = document.getElementById("empty-weight").value;
  const full  = document.getElementById("full-weight").value;

  if(empty===""||full===""){ alert("Complete valores"); return; }

  localStorage.setItem("empty", empty);
  localStorage.setItem("full", full);
  alert("Guardado");
}

function loadConfig(){
  const empty = localStorage.getItem("empty");
  const full  = localStorage.getItem("full");

  if(empty) document.getElementById("empty-weight").value=empty;
  if(full) document.getElementById("full-weight").value=full;
}

// CHART
const chart = new Chart(document.getElementById("chart"),{
  type:'line',
  data:{labels:[],datasets:[{
    data:[],
    borderColor:"#667eea",
    borderWidth:1,
    tension:0.4,
    pointRadius:0
  }]},
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      y:{min:0,ticks:{callback:v=>v.toFixed(2)}},
      x:{ticks:{autoSkip:false},grid:{display:false}}
    }
  }
});

// LOOP
setInterval(async()=>{
  let res = await db.from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .order("created_at",{ascending:false})
    .limit(1);

  if(!res.data.length){
    res = await db.from("sensor_data")
      .select("*")
      .eq("device_mac", device)
      .order("created_at",{ascending:false})
      .limit(1);
  }

  const d=res.data[0]; if(!d) return;

  const empty=parseFloat(localStorage.getItem("empty")||0);
  const full=parseFloat(localStorage.getItem("full")||0);
  const weight=parseFloat(d.weight)||0;

  const net=weight>empty?weight-empty:0;
  const percent=full>empty?(net/(full-empty))*100:0;

  document.getElementById("digital").innerText=net.toFixed(2);
  document.getElementById("gauge-value").innerText=percent.toFixed(1)+"%";

  const c=298.5;
  document.getElementById("gauge-fill").style.strokeDashoffset=c-(percent/100)*c;

  document.getElementById("battery-fill").style.width=d.battery_percentage+"%";
  document.getElementById("battery-text").innerText=d.battery_percentage+"%";

},5000);

// CHART CON PLAN
async function loadChart(){

  const plan=getPlan();
  let hours=24;
  if(plan==="hogar") hours=24*30;
  if(plan==="empresa") hours=24*180;

  const lastTime=new Date(Date.now()-hours*60*60*1000).toISOString();

  let res = await db.from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .gte("created_at", lastTime)
    .order("created_at",{ascending:true})
    .limit(200);

  if(!res.data.length){
    res = await db.from("sensor_data")
      .select("*")
      .eq("device_id", device)
      .order("created_at",{ascending:true})
      .limit(200);
  }

  const data=res.data;
  if(!data) return;

  const empty=parseFloat(localStorage.getItem("empty")||0);

  chart.data.labels=data.map(d=>{
    const t=new Date(d.created_at);
    return t.getMinutes()===0 ? t.getHours()+":00" : "";
  });

  chart.data.datasets[0].data=data.map(d=>{
    const w=parseFloat(d.weight)||0;
    return w>empty?w-empty:0;
  });

  chart.update();
}

loadChart();
setInterval(loadChart,30000);

loadConfig();
updatePlanUI();

</script>

</body>
</html>
