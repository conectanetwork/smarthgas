<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartGas Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#222;
}
[data-theme="dark"] {
  --bg:#1a202c;
  --card:#2d3748;
  --text:#ffffff;
}

body {
  margin:0;
  font-family:'Segoe UI';
  background:var(--bg);
  color:var(--text);
}

.header {
  background:var(--card);
  padding:15px;
  text-align:center;
  position:relative;
}
.toggle {
  position:absolute;
  right:20px;
  top:15px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.card {
  background:var(--card);
  border-radius:12px;
  padding:15px;
}

.top-box {
  height:230px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.gauge svg {
  width:220px;
}

.digital-box {
  background:#667eea;
  border-radius:10px;
  color:white;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
#digital {
  font-size:42px;
}

.chart-container {
  grid-column:1/-1;
  height:260px;
}

.left-column {
  display:flex;
  flex-direction:column;
  gap:15px;
}

.battery {
  height:8px;
  background:#ccc;
  border-radius:10px;
}
.fill { height:100%; }

.plans {
  display:flex;
  gap:10px;
}
.plan-btn {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}
.hogar { background:#48bb78; }
.empresa { background:#667eea; }

.config input {
  width:100%;
  padding:8px;
  margin:5px 0 10px;
}
</style>
</head>

<body>

<script>
const params = new URLSearchParams(window.location.search);
const device = params.get("device");

if (!device) {
  document.body.innerHTML = "<h2 style='text-align:center'>Acceso inválido</h2>";
  throw "No device";
}
</script>

<div class="header">
  SMARTGAS - CONECTA NETWORK
  <button class="toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="grid">

<!-- GAUGE -->
<div class="card top-box gauge">
  <div>
    <svg viewBox="0 0 200 120">
      <path d="M20 100 A80 80 0 0 1 180 100"
        stroke="#eee" stroke-width="10" fill="none"/>
      <path id="gauge-fill"
        d="M20 100 A80 80 0 0 1 180 100"
        stroke="green" stroke-width="10" fill="none"
        stroke-dasharray="251.2"
        stroke-dashoffset="251.2"/>
    </svg>
    <div id="gauge-value" style="text-align:center;"></div>
  </div>
</div>

<!-- DIGITAL -->
<div class="card top-box">
  <div class="digital-box">
    <div id="digital">0.00</div>
    kg
  </div>
</div>

<!-- CHART -->
<div class="card chart-container">
  <canvas id="chart"></canvas>
</div>

<!-- IZQUIERDA -->
<div class="left-column">

  <div class="card">
    <h3>Batería</h3>
    <div class="battery">
      <div id="battery-fill" class="fill"></div>
    </div>
    <div id="battery-text"></div>
  </div>

  <div class="card">
    <h3>Planes</h3>
    <div class="plans">
      <button class="plan-btn hogar" onclick="pagar('hogar')">Hogar</button>
      <button class="plan-btn empresa" onclick="pagar('empresa')">Empresa</button>
    </div>
  </div>

</div>

<!-- CONFIG -->
<div class="card config">
  <h3>Configuración cilindro</h3>
  <label>Peso vacío</label>
  <input id="empty-weight">
  <label>Peso lleno</label>
  <input id="full-weight">
  <button onclick="saveConfig()">Guardar</button>
</div>

</div>

<script>

// SUPABASE
const db = supabase.createClient(
  "https://uooftjtllmsnugdcldvc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo"
);

// THEME
function toggleTheme(){
  document.body.dataset.theme =
    document.body.dataset.theme === "dark" ? "light":"dark";
}

// CONFIG
function saveConfig(){
  localStorage.setItem("empty", document.getElementById("empty-weight").value);
  localStorage.setItem("full", document.getElementById("full-weight").value);
}

// STRIPE
async function pagar(plan){
  const res = await fetch("http://localhost:3000/create-checkout-session",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({plan})
  });
  const data = await res.json();
  window.location.href = data.url;
}

// CHART
const chart = new Chart(document.getElementById("chart"),{
  type:'line',
  data:{
    labels:[],
    datasets:[{
      data:[],
      borderColor:"#667eea",
      borderWidth:1,
      tension:0.4,
      pointRadius:0
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      y:{
        min:0,
        ticks:{
          callback:v=>v.toFixed(2)
        }
      },
      x:{
        ticks:{
          autoSkip:false,
          maxRotation:0
        },
        grid:{display:false}
      }
    }
  }
});

// LOOP PRINCIPAL
setInterval(async()=>{
  let res = await db.from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .order("created_at",{ascending:false})
    .limit(1);

  if (!res.data.length){
    res = await db.from("sensor_data")
      .select("*")
      .eq("device_mac", device)
      .order("created_at",{ascending:false})
      .limit(1);
  }

  const d = res.data[0];
  if(!d) return;

  const empty = parseFloat(localStorage.getItem("empty")||0);
  const full = parseFloat(localStorage.getItem("full")||0);

  const weight = parseFloat(d.weight)||0;

  let net = weight>empty ? weight-empty : 0;
  let percent = full>empty ? (net/(full-empty))*100 : 0;

  document.getElementById("digital").innerText = net.toFixed(2);
  document.getElementById("gauge-value").innerText = percent.toFixed(1)+"%";

  const offset = 251.2-(percent/100)*251.2;
  document.getElementById("gauge-fill").style.strokeDashoffset=offset;

  document.getElementById("battery-fill").style.width=d.battery_percentage+"%";
  document.getElementById("battery-text").innerText=d.battery_percentage+"%";

},5000);

// 📈 GRÁFICO 24H
async function loadChart(){

  let res = await db.from("sensor_data")
    .select("*")
    .eq("device_id", device)
    .gte("created_at", new Date(Date.now()-24*60*60*1000).toISOString())
    .order("created_at",{ascending:true})
    .limit(96);

  if (!res.data.length){
    res = await db.from("sensor_data")
      .select("*")
      .eq("device_mac", device)
      .gte("created_at", new Date(Date.now()-24*60*60*1000).toISOString())
      .order("created_at",{ascending:true})
      .limit(96);
  }

  const data = res.data;
  if(!data) return;

  const empty = parseFloat(localStorage.getItem("empty")||0);

  chart.data.labels = data.map(d=>{
    const t=new Date(d.created_at);
    return t.getMinutes()===0 ? t.getHours()+":00" : "";
  });

  chart.data.datasets[0].data = data.map(d=>{
    const w=parseFloat(d.weight)||0;
    return w>empty ? w-empty : 0;
  });

  chart.update();
}

loadChart();
setInterval(loadChart,60000);

</script>

</body>
</html>
