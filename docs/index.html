<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGas SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background:#f5f7fa;
  margin:0;
}

/* LOGIN */
#login-box{
  max-width:300px;
  margin:100px auto;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}
#dashboard{display:none}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  background:white;
}
.title{font-size:28px}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
}

/* GAUGE */
#gauge{
  text-align:center;
  font-size:40px;
}

/* DIGITAL */
#digital{
  text-align:center;
  font-size:50px;
}

/* CHART */
#chart-container{
  grid-column:1/-1;
}

/* PLANES */
.plans{
  display:flex;
  gap:10px;
  justify-content:center;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.btn-pay{background:#667eea;color:white}

/* BATERIA */
.battery{
  height:20px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}
.fill{
  height:100%;
  background:green;
  width:0%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-box">
  <h3>Login SmartGas</h3>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
  <div class="title">SMARTGAS - CONECTA NETWORK</div>
</div>

<div class="grid">

<!-- GAUGE -->
<div class="card">
  <h3>Nivel</h3>
  <div id="gauge">0%</div>
</div>

<!-- DIGITAL -->
<div class="card">
  <h3>Peso Neto</h3>
  <div id="digital">0.00</div>
</div>

<!-- CHART -->
<div class="card" id="chart-container">
  <canvas id="chart"></canvas>
</div>

<!-- BATERIA -->
<div class="card">
  <h3>Batería</h3>
  <div class="battery">
    <div class="fill" id="battery-fill"></div>
  </div>
  <span id="battery-text"></span>
</div>

<!-- PLANES -->
<div class="card">
  <h3>Planes</h3>
  <div class="plans">
    <button class="btn-pay" onclick="pagar('hogar')">Hogar</button>
    <button class="btn-pay" onclick="pagar('empresa')">Empresa</button>
  </div>
</div>

<!-- CONFIG -->
<div class="card">
  <h3>Configuración</h3>
  <input id="empty" placeholder="Peso vacío">
  <input id="full" placeholder="Peso lleno">
  <button onclick="saveConfig()">Guardar</button>
</div>

</div>
</div>

<script>

// =======================
// SUPABASE
// =======================
const SUPABASE_URL = "https://uooftjtllmsnugdcldvc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvb2Z0anRsbG1zbnVnZGNsZHZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NzU3MTgsImV4cCI6MjA4MzA1MTcxOH0.L5NiZfGOlDT1vie9xEkFAFGwD-mLKAfk29FT02RwEOo";
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// =======================
// LOGIN SIMPLE
// =======================
function login(){
  document.getElementById("login-box").style.display="none";
  document.getElementById("dashboard").style.display="block";
  loadData();
}

// =======================
// PAGOS STRIPE
// =======================
async function pagar(plan){
  const res = await fetch("http://localhost:3000/create-checkout-session",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({plan})
  });

  const data = await res.json();
  window.location.href = data.url;
}

// =======================
// CONFIG
// =======================
function saveConfig(){
  localStorage.setItem("empty",document.getElementById("empty").value);
  localStorage.setItem("full",document.getElementById("full").value);
}

// =======================
// CHART
// =======================
const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx,{
  type:'line',
  data:{labels:[],datasets:[{data:[]}]}
});

// =======================
// DATA
// =======================
async function loadData(){

  setInterval(async()=>{

    const {data} = await db
      .from("sensor_data")
      .select("*")
      .order("created_at",{ascending:false})
      .limit(1);

    if(!data || data.length==0)return;

    const d = data[0];

    const empty = parseFloat(localStorage.getItem("empty")||5);
    const full = parseFloat(localStorage.getItem("full")||15);

    const net = d.weight - empty;
    const percent = ((net)/(full-empty))*100;

    document.getElementById("digital").innerText = net.toFixed(2);
    document.getElementById("gauge").innerText = percent.toFixed(1)+"%";

    // batería
    document.getElementById("battery-fill").style.width = d.battery_percentage+"%";
    document.getElementById("battery-text").innerText = d.battery_percentage+"%";

    // chart FIFO
    chart.data.labels.push(new Date().toLocaleTimeString());
    chart.data.datasets[0].data.push(net);

    if(chart.data.labels.length>96){
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
    }

    chart.update();

  },10000);
}

</script>

</body>
</html>
